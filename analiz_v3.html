<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Futures Analiz Pro • AI Prompt (Otomatik Kopyala)</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        analiz: {
                            bg: '#06080d',
                            surface: '#0c1018',
                            card: '#101520',
                            border: '#1c2535',
                            border2: '#243040',
                            text: '#e0e0e0',
                            text2: '#90a4ae',
                        },
                        premium: {
                            green: '#00e676',
                            red: '#ff1744',
                            yellow: '#ffea00',
                            blue: '#40c4ff',
                            purple: '#e040fb',
                            orange: '#ff9100',
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        bebas: ['Bebas Neue', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.umd.min.js"></script>
  <script src="karar-motoru.js"></script>
  <script src="prompt-engine.js"></script>
  <script src="chart-engine.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <style>
    /* Stil kodları öncekiyle aynı, değişiklik yok */
    :root {
      --bg: #06080d;
      --surface: #0c1018;
      --card: #101520;
      --border: #1c2535;
      --border2: #243040;
      --green: #00e676;
      --red: #ff1744;
      --yellow: #ffea00;
      --blue: #40c4ff;
      --purple: #e040fb;
      --orange: #ff9100;
      --text: #e0e0e0;
      --text2: #90a4ae;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 16px 12px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--green);
    }

    .logo-sub {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Global Header Nav */
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-nav {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn:hover, .nav-btn.active {
      border-color: var(--green);
      background: var(--surface);
      transform: translateY(-1px);
    }

    .nav-btn.active {
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.15);
      color: var(--green);
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type=text] {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 16px;
      border-radius: 8px;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: border-color 0.2s;
    }

    input[type=text]:focus {
      border-color: var(--green);
    }

    input::placeholder {
      color: var(--text2);
      font-size: 11px;
    }

    .btn {
      background: var(--green);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-weight: 600;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-ai {
      background: var(--purple);
      color: #fff;
      margin-left: 8px;
    }

    .error {
      background: rgba(255, 23, 68, 0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 14px;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-size: 11px;
      letter-spacing: 4px;
      display: none;
    }

    .loading span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    .loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.1;
      }
    }

    .verdict {
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .verdict.short {
      background: rgba(255, 23, 68, 0.08);
      border: 1px solid var(--red);
    }

    .verdict.long {
      background: rgba(0, 230, 118, 0.08);
      border: 1px solid var(--green);
    }

    .verdict.neutral {
      background: rgba(255, 234, 0, 0.06);
      border: 1px solid var(--yellow);
    }

    .verdict-tag {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .verdict-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .verdict-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .chip-bear {
      color: var(--red);
      border-color: rgba(255, 23, 68, 0.4);
      background: rgba(255, 23, 68, 0.08);
    }

    .chip-bull {
      color: var(--green);
      border-color: rgba(0, 230, 118, 0.4);
      background: rgba(0, 230, 118, 0.08);
    }

    .chip-warn {
      color: var(--yellow);
      border-color: rgba(255, 234, 0, 0.4);
      background: rgba(255, 234, 0, 0.06);
    }

    .chip-info {
      color: var(--blue);
      border-color: rgba(64, 196, 255, 0.4);
      background: rgba(64, 196, 255, 0.06);
    }

    .chart-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      display: none;
      animation: slideUp 0.4s ease;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chart-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text2);
    }

    .tf-btns {
      display: flex;
      gap: 5px;
    }

    .tf-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 28px;
    }

    .tf-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .tf-btn.active {
      background: rgba(0, 230, 118, 0.1);
      border-color: var(--green);
      color: var(--green);
    }

    .chart-wrap {
      position: relative;
      height: 300px;
    }

    .chart-wrap-sub {
      position: relative;
      height: 120px;
      margin-top: 12px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text2);
      margin: 16px 0 8px;
      padding-left: 10px;
      border-left: 3px solid var(--border2);
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      animation: slideUp 0.4s ease;
    }

    .card-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .card-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 10px;
      color: var(--text2);
      line-height: 1.6;
    }

    .c-green {
      color: var(--green);
    }

    .c-red {
      color: var(--red);
    }

    .c-yellow {
      color: var(--yellow);
    }

    .c-blue {
      color: var(--blue);
    }

    .c-purple {
      color: var(--purple);
    }

    .c-orange {
      color: var(--orange);
    }

    .c-white {
      color: var(--white);
    }

    .bar-wrap {
      margin-top: 10px;
    }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 10px;
    }

    .bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ls-track {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0 6px;
    }

    .ls-s {
      background: var(--red);
      transition: width 1s ease;
    }

    .ls-l {
      background: var(--green);
      transition: width 1s ease;
    }

    .ls-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }

    .macd-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .macd-item {
      flex: 1;
      min-width: 70px;
    }

    .macd-item-label {
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .macd-item-val {
      font-size: 14px;
      font-weight: 700;
    }

    .boll-visual {
      position: relative;
      height: 70px;
      margin-top: 12px;
      border: 1px solid var(--border2);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
    }

    .boll-values {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
    }

    .boll-values span {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sr-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      border: 1px solid;
    }

    .sr-item.resistance {
      border-color: rgba(255, 23, 68, 0.3);
      background: rgba(255, 23, 68, 0.05);
    }

    .sr-item.support {
      border-color: rgba(0, 230, 118, 0.3);
      background: rgba(0, 230, 118, 0.05);
    }

    .sr-item.current {
      border-color: rgba(255, 234, 0, 0.4);
      background: rgba(255, 234, 0, 0.07);
    }

    .sr-left {
      font-size: 10px;
      color: var(--text2);
    }

    .sr-price {
      font-size: 16px;
      font-weight: 700;
    }

    .sr-dist {
      font-size: 10px;
    }

    .fh-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .fh-item:last-child {
      border-bottom: none;
    }

    .refresh-row {
      display: none;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .refresh-info {
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 1px;
    }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-refresh:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .oi-change {
      font-size: 12px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .oi-arrow {
      font-size: 14px;
    }

    .funding-trend {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .trend-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
    }

    .volume-spike-card {
      border-left: 4px solid var(--orange);
      background: rgba(255, 145, 0, 0.05);
    }

    .ai-btn-container {
      display: flex;
      align-items: center;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 500px) {

      .grid2,
      .grid3 {
        grid-template-columns: 1fr;
      }

      .card-value {
        font-size: 24px;
      }
    }

    /* ── LİKİDİTE AVI PANELİ ── */
    .lh-panel {
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border2);
      background: var(--card);
      animation: slideUp 0.4s ease;
    }

    .lh-panel.lh-normal {
      border-color: rgba(64, 196, 255, 0.3);
      background: rgba(64, 196, 255, 0.03);
    }

    .lh-panel.lh-suspect {
      border-color: rgba(255, 145, 0, 0.5);
      background: rgba(255, 145, 0, 0.05);
    }

    .lh-panel.lh-likely {
      border-color: rgba(255, 23, 68, 0.5);
      background: rgba(255, 23, 68, 0.06);
    }

    .lh-panel.lh-confirm {
      border-color: rgba(255, 23, 68, 0.9);
      background: rgba(255, 23, 68, 0.08);
      box-shadow: 0 0 24px rgba(255, 23, 68, 0.15);
      animation: lhPulse 2s ease-in-out infinite;
    }

    @keyframes lhPulse {

      0%,
      100% {
        box-shadow: 0 0 14px rgba(255, 23, 68, 0.12);
      }

      50% {
        box-shadow: 0 0 32px rgba(255, 23, 68, 0.30);
      }
    }

    .lh-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .lh-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .lh-badge {
      font-size: 10px;
      letter-spacing: 2px;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 700;
      border: 1px solid;
      text-transform: uppercase;
    }

    .lh-badge.badge-normal {
      color: var(--blue);
      border-color: rgba(64, 196, 255, 0.5);
      background: rgba(64, 196, 255, 0.08);
    }

    .lh-badge.badge-suspect {
      color: var(--orange);
      border-color: rgba(255, 145, 0, 0.5);
      background: rgba(255, 145, 0, 0.08);
    }

    .lh-badge.badge-likely {
      color: var(--red);
      border-color: rgba(255, 23, 68, 0.5);
      background: rgba(255, 23, 68, 0.08);
    }

    .lh-badge.badge-confirm {
      color: #fff;
      border-color: var(--red);
      background: rgba(255, 23, 68, 0.25);
      animation: badgeBlink 1s step-end infinite;
    }

    @keyframes badgeBlink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    .lh-score-wrap {
      margin-bottom: 14px;
    }

    .lh-score-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text2);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .lh-score-track {
      height: 10px;
      background: var(--border);
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .lh-score-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, var(--blue) 0%, var(--green) 30%, var(--yellow) 60%, var(--orange) 80%, var(--red) 100%);
    }

    .lh-score-markers {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 9px;
      color: var(--border2);
    }

    .lh-signals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .lh-signal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 10px;
      transition: border-color 0.3s, background 0.3s;
    }

    .lh-signal-item.active-bull {
      border-color: rgba(0, 230, 118, 0.5);
      background: rgba(0, 230, 118, 0.06);
    }

    .lh-signal-item.active-bear {
      border-color: rgba(255, 23, 68, 0.5);
      background: rgba(255, 23, 68, 0.06);
    }

    .lh-signal-item.active-warn {
      border-color: rgba(255, 145, 0, 0.5);
      background: rgba(255, 145, 0, 0.06);
    }

    .lh-signal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border2);
    }

    .lh-signal-dot.dot-active-bull {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .lh-signal-dot.dot-active-bear {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    .lh-signal-dot.dot-active-warn {
      background: var(--orange);
      box-shadow: 0 0 6px var(--orange);
    }

    .lh-signal-text {
      flex: 1;
      line-height: 1.4;
    }

    .lh-signal-pts {
      font-size: 9px;
      color: var(--text2);
      font-weight: 700;
    }

    .lh-direction {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .lh-dir-chip {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 1px;
    }

    .lh-dir-chip.buyside {
      border-color: rgba(0, 230, 118, 0.4);
      background: rgba(0, 230, 118, 0.06);
    }

    .lh-dir-chip.sellside {
      border-color: rgba(255, 23, 68, 0.4);
      background: rgba(255, 23, 68, 0.06);
    }

    .lh-dir-chip.neutral {
      border-color: rgba(255, 234, 0, 0.3);
      background: rgba(255, 234, 0, 0.04);
    }

    .lh-dir-label {
      font-size: 9px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .lh-dir-val {
      font-weight: 700;
      font-size: 13px;
    }

  <script>
    (function () {
      if (typeof ChartFinancial !== 'undefined') {
        Chart.register(ChartFinancial);
      }

      const BASE_F = 'https://fapi.binance.com';
      const CMC_PROXY = 'https://api.coingecko.com/api/v3';

      let currentSymbol = 'BTCUSDT';
      let currentTF = '4h';
      let lastAnalysisData = {};

      // ── HESAPLAMALAR ─────────────────────────────────────────
      function calcSingleRSI(closes, period = 14) {
        if (closes.length < period + 1) return null;
        const rsiArr = window.chartEngine.calcRSIWilder(closes, period);
        return rsiArr[rsiArr.length - 1];
      }

      function calcSingleBollinger(closes, period = 20, mult = 2) {
        if (closes.length < period) return null;
        const slice = closes.slice(-period);
        const m = slice.reduce((a, b) => a + b, 0) / period;
        const std = Math.sqrt(slice.reduce((a, b) => a + Math.pow(b - m, 2), 0) / period);
        return { upper: m + mult * std, mid: m, lower: m - mult * std, std };
      }

      function calcSingleMACD(closes) {
        if (closes.length < 35) return null;
        const ema12 = window.chartEngine.calcEMA(closes, 12).filter(v => v !== null);
        const ema26 = window.chartEngine.calcEMA(closes, 26).filter(v => v !== null);
        const macdVal = ema12[ema12.length - 1] - ema26[ema26.length - 1];
        const macdSeries = [];
        for (let i = 26; i <= closes.length; i++) {
          const e12 = window.chartEngine.calcEMA(closes.slice(0, i), 12).filter(v => v !== null);
          const e26 = window.chartEngine.calcEMA(closes.slice(0, i), 26).filter(v => v !== null);
          macdSeries.push(e12[e12.length - 1] - e26[e26.length - 1]);
        }
        const sigArr = window.chartEngine.calcEMA(macdSeries, 9).filter(v => v !== null);
        const sig = sigArr[sigArr.length - 1];
        return { macd: macdVal, signal: sig, histogram: macdVal - sig };
      }

      function calcSR(klines1d, klinesTF) {
        // Gunluk + TF mumlarini birlestir, her ikisinden pivot cikar
        const price = (() => {
          const src = (klines1d && klines1d.length) ? klines1d : klinesTF;
          return parseFloat(src[src.length - 1][4]);
        })();

        const allPivots = [];

        function extractPivots(klines, lookback) {
          if (!klines || klines.length < lookback * 2 + 1) return;
          const highs = klines.map(k => parseFloat(k[2]));
          const lows = klines.map(k => parseFloat(k[3]));
          const volumes = klines.map(k => parseFloat(k[5]));
          for (let i = lookback; i < klines.length - lookback; i++) {
            let isHigh = true, isLow = true;
            for (let d = 1; d <= lookback; d++) {
              if (highs[i] <= highs[i - d] || highs[i] <= highs[i + d]) isHigh = false;
              if (lows[i] >= lows[i - d] || lows[i] >= lows[i + d]) isLow = false;
            }
            if (isHigh) allPivots.push({ price: highs[i], volume: volumes[i], type: 'resistance' });
            if (isLow) allPivots.push({ price: lows[i], volume: volumes[i], type: 'support' });
          }
        }

        extractPivots(klines1d || [], 2);
        extractPivots((klinesTF || []).slice(-60), 2);

        // Fiyata %20'den uzak pivotlari at (cok volatil coinlerde genis pivotlari engelle)
        const maxDist = 0.20;
        const filtered = allPivots.filter(p => Math.abs(p.price - price) / price <= maxDist);

        const supports = filtered.filter(p => p.type === 'support' && p.price < price).sort((a, b) => b.price - a.price);
        const resistances = filtered.filter(p => p.type === 'resistance' && p.price > price).sort((a, b) => a.price - b.price);

        // Kumeleme: birbirine %2'den yakin pivotlari birlestir
        function cluster(arr) {
          const result = [];
          for (const p of arr) {
            const last = result[result.length - 1];
            if (last && Math.abs(p.price - last.price) / last.price < 0.02) {
              if (p.volume > last.volume) result[result.length - 1] = p;
            } else {
              result.push(p);
            }
          }
          return result;
        }

        return {
          supports: cluster(supports).slice(0, 4).map(s => s.price),
          resistances: cluster(resistances).slice(0, 4).map(r => r.price),
          price
        };
      }

      function analyzeFundingTrend(rates) {
        if (!rates || rates.length < 2) return null;
        const values = rates.map(r => parseFloat(r.fundingRate));
        const n = values.length;
        const avg = values.reduce((a, b) => a + b, 0) / n;
        const indices = [...Array(n).keys()];
        const avgX = indices.reduce((a, b) => a + b, 0) / n;
        const avgY = avg;
        let num = 0, den = 0;
        for (let i = 0; i < n; i++) {
          num += (indices[i] - avgX) * (values[i] - avgY);
          den += Math.pow(indices[i] - avgX, 2);
        }
        const slope = den !== 0 ? num / den : 0;
        let comment = '';
        if (avg * 100 > 0.05 && slope > 0) comment = 'Longlar doluyor — Short baskısı gelebilir';
        else if (avg * 100 < -0.03 && slope < 0) comment = 'Shortlar sıkışıyor — Long fırsatı';
        else if (avg * 100 > 0.05 && slope < 0) comment = 'Longlar kaçıyor — Düşüş yavaşlayabilir';
        else if (avg * 100 < -0.03 && slope > 0) comment = 'Shortlar artıyor — Dikkat';
        else comment = 'Nötr funding';
        return { avg, slope, comment, values };
      }

      // ── 💣 LİKİDİTE AVI MOTORU ───────────────────────────────
      function detectLiquidityHunt(params) {
        const {
          klines,       // mevcut TF mum verileri (raw)
          closes,       // kapanış fiyatları
          rsi,          // mevcut RSI
          rsiPrev,      // önceki RSI (diverjans için)
          oiChange,     // OI değişim %
          chg24,        // 24s fiyat değişimi
          fundingAvg,   // ortalama funding
          volumeSpike,  // hacim sıçraması var mı
          spikeRatio,   // spike oranı
          supports,     // destek seviyeleri
          resistances,  // direnç seviyeleri
          price,        // güncel fiyat
          highDay,      // günlük yüksek
          lowDay        // günlük düşük
        } = params;

        let score = 0;
        const signals = [];
        const huntLevels = [];

        // ── 1) WİCK SWEEP (+25) ─────────────────────────────────
        let wickSweep = false;
        let wickDir = null;
        if (klines && klines.length >= 3) {
          const recent = klines.slice(-5);
          for (const k of recent) {
            const o = parseFloat(k[1]), h = parseFloat(k[2]);
            const l = parseFloat(k[3]), c = parseFloat(k[4]);
            const range = h - l;
            const upperWick = h - Math.max(o, c);
            const lowerWick = Math.min(o, c) - l;

            // Support sweep: aşağı wick > %0.8 range VE kapanış ortada
            if (range > 0 && lowerWick / range > 0.55 && lowerWick / price > 0.004) {
              // Destek seviyesine dokunmuş mu?
              const nearSupport = supports.some(s => l <= s * 1.005 && l >= s * 0.990);
              if (nearSupport || lowerWick / price > 0.008) {
                wickSweep = true; wickDir = 'sell-side';
                huntLevels.push(l);
              }
            }
            // Resistance sweep: yukarı wick > %0.8 range VE kapanış ortada
            if (range > 0 && upperWick / range > 0.55 && upperWick / price > 0.004) {
              const nearResist = resistances.some(r => h >= r * 0.995 && h <= r * 1.010);
              if (nearResist || upperWick / price > 0.008) {
                wickSweep = true; wickDir = 'buy-side';
                huntLevels.push(h);
              }
            }
          }
        }
        if (wickSweep) {
          score += 25;
          signals.push({ label: '🕯 Wick Sweep', detail: wickDir === 'sell-side' ? 'Destek altı wick, içeri kapandı' : 'Direnç üstü wick, içeri kapandı', pts: 25, type: 'bear' });
        } else {
          signals.push({ label: '🕯 Wick Sweep', detail: 'Tespit edilmedi', pts: 0, type: 'off' });
        }

        // ── 2) FAKE BREAKOUT (+20) ───────────────────────────────
        let fakeBreakout = false;
        let fakeDir = null;
        if (klines && klines.length >= 5) {
          const last = klines[klines.length - 1];
          const prev4 = klines.slice(-5, -1);
          const prevHigh = Math.max(...prev4.map(k => parseFloat(k[2])));
          const prevLow = Math.min(...prev4.map(k => parseFloat(k[3])));
          const lc = parseFloat(last[4]);
          const lh = parseFloat(last[2]);
          const ll = parseFloat(last[3]);

          if (lh > prevHigh && lc < prevHigh * 0.999) {
            fakeBreakout = true; fakeDir = 'buy-side';
            huntLevels.push(lh);
          }
          if (ll < prevLow && lc > prevLow * 1.001) {
            fakeBreakout = true; fakeDir = 'sell-side';
            huntLevels.push(ll);
          }
        }
        if (fakeBreakout) {
          score += 20;
          signals.push({ label: '💥 Fake Breakout', detail: fakeDir === 'buy-side' ? 'Direnç kırıldı ama geri döndü' : 'Destek kırıldı ama geri döndü', pts: 20, type: 'bear' });
        } else {
          signals.push({ label: '💥 Fake Breakout', detail: 'Tespit edilmedi', pts: 0, type: 'off' });
        }

        // ── 3) VOLUME SPİKE FAİL (+15) ───────────────────────────
        let volumeSpikeFail = false;
        if (volumeSpike && spikeRatio >= 2.0) {
          // Hacim yüksek ama fiyat devam etmedi (chg24 küçük veya ters yönde)
          if (Math.abs(chg24) < 1.5 || (spikeRatio > 3 && Math.abs(chg24) < 3)) {
            volumeSpikeFail = true;
          }
        }
        if (volumeSpikeFail) {
          score += 15;
          signals.push({ label: '📊 Volume Spike Fail', detail: `${spikeRatio.toFixed(1)}x hacim, fiyat devam etmedi`, pts: 15, type: 'warn' });
        } else if (volumeSpike) {
          signals.push({ label: '📊 Volume Spike', detail: `${spikeRatio.toFixed(1)}x — yön takip ediliyor`, pts: 0, type: 'off' });
        } else {
          signals.push({ label: '📊 Volume Spike Fail', detail: 'Anormal hacim yok', pts: 0, type: 'off' });
        }

        // ── 4) RSI DİVERJANSI (+15) ──────────────────────────────
        let rsiDiv = false;
        let rsiDivType = '';
        if (rsi && rsiPrev) {
          // Bearish div: fiyat yüksek, RSI düşük (son 2 mum kıyası)
          if (chg24 > 0.5 && rsi < rsiPrev - 3) {
            rsiDiv = true; rsiDivType = 'Bearish — Fiyat ↑ RSI ↓ (dağıtım)';
          }
          // Bullish div: fiyat düşük, RSI yüksek
          if (chg24 < -0.5 && rsi > rsiPrev + 3) {
            rsiDiv = true; rsiDivType = 'Bullish — Fiyat ↓ RSI ↑ (toplama)';
          }
        }
        if (rsiDiv) {
          score += 15;
          signals.push({ label: '📉 RSI Diverjans', detail: rsiDivType, pts: 15, type: 'warn' });
        } else {
          signals.push({ label: '📉 RSI Diverjans', detail: 'Tespit edilmedi', pts: 0, type: 'off' });
        }

        // ── 5) OI MİSMATCH (+15) ─────────────────────────────────
        let oiMismatch = false;
        let oiMismatchDesc = '';
        if (typeof oiChange === 'number') {
          // Fiyat ↑ ama OI ↓ → short squeeze / weak move
          if (chg24 > 1.0 && oiChange < -0.5) {
            oiMismatch = true; oiMismatchDesc = 'Fiyat ↑ + OI ↓ → Gerçek alım değil, sıkışma';
          }
          // Fiyat ↓ ama OI ↓ → long liquidation bitti, dip olabilir (reverse signal)
          if (chg24 < -1.0 && oiChange < -0.5) {
            oiMismatch = true; oiMismatchDesc = 'Fiyat ↓ + OI ↓ → Longlar tasfiye, dip yakın';
          }
        }
        if (oiMismatch) {
          score += 15;
          signals.push({ label: '🔀 OI Mismatch', detail: oiMismatchDesc, pts: 15, type: 'warn' });
        } else {
          signals.push({ label: '🔀 OI Mismatch', detail: 'OI fiyatla uyumlu', pts: 0, type: 'off' });
        }

        // ── 6) FUNDING EXTREME (+10) ─────────────────────────────
        let fundingExtreme = false;
        let fundingExtremeDesc = '';
        const fPct = (fundingAvg || 0) * 100;
        if (fPct > 0.07) {
          fundingExtreme = true; fundingExtremeDesc = `%${fPct.toFixed(4)} — Long trap bölgesi`;
        } else if (fPct < -0.05) {
          fundingExtreme = true; fundingExtremeDesc = `%${fPct.toFixed(4)} — Short trap bölgesi`;
        }
        if (fundingExtreme) {
          score += 10;
          signals.push({ label: '💰 Funding Extreme', detail: fundingExtremeDesc, pts: 10, type: 'warn' });
        } else {
          signals.push({ label: '💰 Funding Extreme', detail: `%${fPct.toFixed(4)} — Normal bölge`, pts: 0, type: 'off' });
        }

        // ── SONUÇ ────────────────────────────────────────────────
        let status, statusKey, emoji;
        if (score >= 80) { status = 'STOP HUNT CONFIRMED'; statusKey = 'confirm'; emoji = '🚨'; }
        else if (score >= 60) { status = 'LIKELY STOP HUNT'; statusKey = 'likely'; emoji = '🔴'; }
        else if (score >= 30) { status = 'ŞÜPHELİ YAPI'; statusKey = 'suspect'; emoji = '🟠'; }
        else { status = 'NORMAL MARKET'; statusKey = 'normal'; emoji = '🟢'; }

        // Likidite yönü
        let liqSide = 'neutral';
        let liqSideDesc = 'Belirgin yön yok';
        if (wickDir === 'sell-side' || fakeDir === 'sell-side') { liqSide = 'sell-side'; liqSideDesc = '🔻 Sell-Side Likidite Alındı'; }
        if (wickDir === 'buy-side' || fakeDir === 'buy-side') { liqSide = 'buy-side'; liqSideDesc = '🔺 Buy-Side Likidite Alındı'; }

        // Dönüş olasılığı
        let reversalLikely = false;
        let reversalDesc = '';
        if (score >= 40) {
          if (liqSide === 'sell-side') { reversalLikely = true; reversalDesc = '↑ Yukarı dönüş olası — Longlar için fırsat'; }
          if (liqSide === 'buy-side') { reversalLikely = true; reversalDesc = '↓ Aşağı dönüş olası — Shortlar için fırsat'; }
        }
        if (!reversalDesc) reversalDesc = score >= 30 ? '⚖️ Yön belirsiz, teyit bekle' : '— Trend devamı bekleniyor';

        return {
          score, status, statusKey, emoji, signals, liqSide, liqSideDesc, reversalLikely, reversalDesc, huntLevels,
          wickSweep, fakeBreakout, volumeSpikeFail, rsiDiv, oiMismatch, fundingExtreme
        };
      }

      // ── 📐 MARKET STRUCTURE CLASSIFIER (SMC) ─────────────────
      // Classifies HH/HL (bullish) or LH/LL (bearish) using pivot logic
      function classifyMarketStructure(klines) {
        if (!klines || klines.length < 10) {
          return { trend: 'UNKNOWN', swings: [], choch: null, bos: null, label: 'Veri yetersiz', bias: 'neut' };
        }

        const highs = klines.map(k => parseFloat(k[2]));
        const lows = klines.map(k => parseFloat(k[3]));
        const closes = klines.map(k => parseFloat(k[4]));
        const N = klines.length;

        // Find swing highs & lows (look-left 3, look-right 2)
        const swingHighs = [], swingLows = [];
        for (let i = 3; i < N - 2; i++) {
          if (highs[i] > highs[i - 1] && highs[i] > highs[i - 2] && highs[i] > highs[i - 3] &&
            highs[i] > highs[i + 1] && highs[i] > highs[i + 2]) {
            swingHighs.push({ idx: i, price: highs[i] });
          }
          if (lows[i] < lows[i - 1] && lows[i] < lows[i - 2] && lows[i] < lows[i - 3] &&
            lows[i] < lows[i + 1] && lows[i] < lows[i + 2]) {
            swingLows.push({ idx: i, price: lows[i] });
          }
        }

        // Take last 4 of each for structure analysis
        const lastHighs = swingHighs.slice(-4);
        const lastLows = swingLows.slice(-4);

        let hhCount = 0, hlCount = 0, lhCount = 0, llCount = 0;
        for (let i = 1; i < lastHighs.length; i++) {
          if (lastHighs[i].price > lastHighs[i - 1].price) hhCount++;
          else lhCount++;
        }
        for (let i = 1; i < lastLows.length; i++) {
          if (lastLows[i].price > lastLows[i - 1].price) hlCount++;
          else llCount++;
        }

        // Determine structure bias
        let trend, label, bias;
        const bullScore = hhCount + hlCount;
        const bearScore = lhCount + llCount;
        if (bullScore > bearScore + 1) { trend = 'BULLISH'; label = 'HH + HL — Yükseliş yapısı'; bias = 'bull'; }
        else if (bearScore > bullScore + 1) { trend = 'BEARISH'; label = 'LH + LL — Düşüş yapısı'; bias = 'bear'; }
        else { trend = 'RANGING'; label = 'Karışık — Konsolidasyon'; bias = 'neut'; }

        // Change of Character (CHoCH) detection
        // CHoCH = last swing high broken from bearish, or last swing low broken from bullish
        let choch = null;
        const price = closes[N - 1];
        if (trend === 'BEARISH' && lastHighs.length >= 1) {
          const lastSH = lastHighs[lastHighs.length - 1].price;
          if (price > lastSH) choch = { type: 'CHoCH YUKARISI', detail: `Son swing high ${fp(lastSH)} kırıldı — Olası trend değişimi`, color: 'green' };
        }
        if (trend === 'BULLISH' && lastLows.length >= 1) {
          const lastSL = lastLows[lastLows.length - 1].price;
          if (price < lastSL) choch = { type: 'CHoCH AŞAĞISI', detail: `Son swing low ${fp(lastSL)} kırıldı — Olası trend değişimi`, color: 'red' };
        }

        // Break of Structure (BOS) = same direction continuation
        let bos = null;
        if (trend === 'BULLISH' && lastHighs.length >= 2) {
          const prevSH = lastHighs[lastHighs.length - 2].price;
          if (price > prevSH * 1.001) bos = { type: 'BOS YUKARISI', detail: `Önceki HH ${fp(prevSH)} aşıldı — Trend devam`, color: 'green' };
        }
        if (trend === 'BEARISH' && lastLows.length >= 2) {
          const prevSL = lastLows[lastLows.length - 2].price;
          if (price < prevSL * 0.999) bos = { type: 'BOS AŞAĞISI', detail: `Önceki LL ${fp(prevSL)} kırıldı — Trend devam`, color: 'red' };
        }

        // Build swing summary (last 3 each)
        const swings = [];
        lastHighs.slice(-3).forEach((h, i, arr) => {
          const type = i > 0 ? (h.price > arr[i - 1].price ? 'HH' : 'LH') : '—';
          swings.push({ label: `Swing High ${i + 1}`, type, price: h.price, color: type === 'HH' ? 'green' : type === 'LH' ? 'red' : 'text2' });
        });
        lastLows.slice(-3).forEach((l, i, arr) => {
          const type = i > 0 ? (l.price > arr[i - 1].price ? 'HL' : 'LL') : '—';
          swings.push({ label: `Swing Low ${i + 1}`, type, price: l.price, color: type === 'HL' ? 'green' : type === 'LL' ? 'red' : 'text2' });
        });
        swings.sort((a, b) => b.price - a.price);

        return { trend, label, bias, hhCount, hlCount, lhCount, llCount, choch, bos, swings };
      }

      function renderMarketStructure(ms) {
        const trendColor = ms.bias === 'bull' ? 'text-premium-green' : ms.bias === 'bear' ? 'text-premium-red' : 'text-premium-yellow';
        const trendBg = ms.bias === 'bull' ? 'bg-premium-green/10' : ms.bias === 'bear' ? 'bg-premium-red/10' : 'bg-premium-yellow/10';

        const swingsHtml = ms.swings.slice(0, 6).map(s => {

      // ── 🔀 FUNDING + OI DIVERGENCE ENGINE ────────────────────

        const oiUp = (oiChange || 0) > 0.3;
        const oiDown = (oiChange || 0) < -0.3;

          actionHint = 'Long bias. Ters yön hareketi için hazır ol.';
        } else if (fundPos && oiUp) {

          actionHint = 'Yeni long girişi riskli. Mevcut longlar için SL sıkıştır.';
        } else if (fundPos && oiDown) {
          fundingOIState = 'LONG_EXIT_DIVERGENCE';
          stateClass = 'foi-divg';
          stateLabel = '🟠 DİVERJANS — LONGLAR KAÇIYOR';
          divergence = true;
          description = 'Funding hâlâ pozitif ama OI düşüyor → Longlar pozisyonlarını kapatıyor. Zayıf yükseliş.';
          actionHint = 'Dikkatli ol. Fiyat yükselse bile yapı bozuluyor.';
        } else if (fundNeg && oiUp) {
          fundingOIState = 'SHORT_BUILDUP_DIVERGENCE';
          stateClass = 'foi-divg';
          stateLabel = '🟠 DİVERJANS — SHORTLAR BİRİKİYOR';
          divergence = true;
          description = 'Funding negatif + OI artıyor → Agresif short girişi. Fiyat düştükçe kaldıraç artıyor.';
          actionHint = 'Short squeeze tuzağına dikkat. Ani dip alımları olabilir.';
        } else {
          fundingOIState = 'NEUTRAL';
          stateClass = 'foi-neut';
          stateLabel = '⚪ NÖTR — DENGELİ YAPI';

          description = 'Funding ve OI normal seviyelerde. Belirgin bir birikim veya dağıtım sinyali yok.';

        // Extra: extreme funding check

        if (fPct > 0.10) fundingAlert = { msg: `⚠ Aşırı yüksek funding (%${fPct.toFixed(4)}) — Long tuzağı riski kritik`, color: 'red' };
        else if (fPct < -0.07) fundingAlert = { msg: `⚠ Aşırı negatif funding (%${fPct.toFixed(4)}) — Short tuzağı riski kritik`, color: 'green' };

        // LS ratio insight
        let lsInsight = '';
        if (longPct && shortPct) {
          if (shortPct > 70 && fundingOIState === 'BULLISH_SQUEEZE') lsInsight = `%${shortPct.toFixed(0)} short + squeeze sinyali → GÜÇLÜ dönüş beklentisi`;
          else if (longPct > 70 && fundingOIState === 'BEARISH_TRAP') lsInsight = `%${longPct.toFixed(0)} long + trap sinyali → GÜÇLÜ dump riski`;
        }

        return { fundingOIState, divergence, stateLabel, stateClass, description, actionHint, fundingAlert, lsInsight, fPct, oiChange };

      // ── 🏆 KOMPOZİT SKOR MOTORU (0–100) ─────────────────────
      function calcCompositeScore(params) {
        const { rsi, rsi4h, macd, boll, price, fundingAvg, oiChange, chg24,
          supports, resistances, lhResult, msResult, foiResult,
          volumeSpike, spikeRatio, longPct, shortPct } = params;

        let bullPts = 0, bearPts = 0;
        const factors = [];

        // ── RSI (max 20 pts) ────────────────────────────────────
        if (rsi) {
          if (rsi < 30) { bullPts += 20; factors.push({ k: 'RSI Oversold', v: '+20 Bull', c: 'green' }); }
          else if (rsi < 45) { bullPts += 8; factors.push({ k: 'RSI Low', v: '+8 Bull', c: 'green' }); }
          else if (rsi > 70) { bearPts += 20; factors.push({ k: 'RSI Overbought', v: '+20 Bear', c: 'red' }); }
          else if (rsi > 58) { bearPts += 8; factors.push({ k: 'RSI High', v: '+8 Bear', c: 'red' }); }
          else { factors.push({ k: 'RSI', v: 'Nötr', c: 'text2' }); }
        }

        // ── MACD (max 15 pts) ───────────────────────────────────
        if (macd) {
          if (macd.histogram > 0 && macd.macd > 0) { bullPts += 15; factors.push({ k: 'MACD', v: '+15 Bull', c: 'green' }); }
          else if (macd.histogram < 0 && macd.macd < 0) { bearPts += 15; factors.push({ k: 'MACD', v: '+15 Bear', c: 'red' }); }
          else if (macd.histogram > 0) { bullPts += 6; factors.push({ k: 'MACD Güçleniyor', v: '+6 Bull', c: 'green' }); }
          else { bearPts += 6; factors.push({ k: 'MACD Zayıflıyor', v: '+6 Bear', c: 'red' }); }
        }

        // ── BOLLINGER (max 12 pts) ──────────────────────────────
        if (boll) {
          const pos = (price - boll.lower) / (boll.upper - boll.lower);
          if (pos < 0.1) { bullPts += 12; factors.push({ k: 'Bollinger Alt Bant', v: '+12 Bull', c: 'green' }); }
          else if (pos < 0.3) { bullPts += 5; factors.push({ k: 'Bollinger Alt Bölge', v: '+5 Bull', c: 'green' }); }
          else if (pos > 0.9) { bearPts += 12; factors.push({ k: 'Bollinger Üst Bant', v: '+12 Bear', c: 'red' }); }
          else if (pos > 0.7) { bearPts += 5; factors.push({ k: 'Bollinger Üst Bölge', v: '+5 Bear', c: 'red' }); }
        }

        // ── FUNDING + OI (max 15 pts) ───────────────────────────
        if (foiResult) {
          if (foiResult.fundingOIState === 'BULLISH_SQUEEZE') { bullPts += 15; factors.push({ k: 'FOI Engine', v: '+15 Bull (Squeeze)', c: 'green' }); }
          else if (foiResult.fundingOIState === 'BEARISH_TRAP') { bearPts += 15; factors.push({ k: 'FOI Engine', v: '+15 Bear (Trap)', c: 'red' }); }
          else if (foiResult.fundingOIState === 'LONG_EXIT_DIVERGENCE') { bearPts += 8; factors.push({ k: 'FOI Diverjans', v: '+8 Bear (Exit)', c: 'orange' }); }
          else if (foiResult.fundingOIState === 'SHORT_BUILDUP_DIVERGENCE') { bearPts += 6; factors.push({ k: 'FOI Diverjans', v: '+6 Bear (Build)', c: 'orange' }); }
        }

        // ── MARKET STRUCTURE (max 10 pts) ───────────────────────
        if (msResult) {
          if (msResult.trend === 'BULLISH') { bullPts += 10; factors.push({ k: 'MS Yapısı HH/HL', v: '+10 Bull', c: 'green' }); }
          else if (msResult.trend === 'BEARISH') { bearPts += 10; factors.push({ k: 'MS Yapısı LH/LL', v: '+10 Bear', c: 'red' }); }
          if (msResult.choch) {
            if (msResult.choch.color === 'green') { bullPts += 8; factors.push({ k: 'CHoCH Yukarı', v: '+8 Bull', c: 'green' }); }
            else { bearPts += 8; factors.push({ k: 'CHoCH Aşağı', v: '+8 Bear', c: 'red' }); }
          }
          if (msResult.bos) {
            if (msResult.bos.color === 'green') { bullPts += 5; factors.push({ k: 'BOS Yukarı', v: '+5 Bull', c: 'green' }); }
            else { bearPts += 5; factors.push({ k: 'BOS Aşağı', v: '+5 Bear', c: 'red' }); }
          }
        }

        // ── LIQUIDITY HUNT (max 10 pts penalty) ─────────────────
        if (lhResult && lhResult.score >= 60) {
          if (lhResult.liqSide === 'sell-side' && lhResult.reversalLikely) { bullPts += 10; factors.push({ k: 'LH Sell-side Hunt', v: '+10 Bull (reversal)', c: 'green' }); }
          else if (lhResult.liqSide === 'buy-side' && lhResult.reversalLikely) { bearPts += 10; factors.push({ k: 'LH Buy-side Hunt', v: '+10 Bear (reversal)', c: 'red' }); }
        }

        // ── LONG/SHORT POSITIONING (max 8 pts) ──────────────────
        if (longPct && shortPct) {
          if (shortPct > 70) { bullPts += 8; factors.push({ k: `%${shortPct.toFixed(0)} Short`, v: '+8 Bull (squeeze)', c: 'green' }); }
          else if (longPct > 70) { bearPts += 8; factors.push({ k: `%${longPct.toFixed(0)} Long`, v: '+8 Bear (trap)', c: 'red' }); }
        }

        // ── FINAL COMPOSITE SCORE ────────────────────────────────
        const total = bullPts + bearPts;
        const bullPct = total > 0 ? Math.round((bullPts / total) * 100) : 50;
        const bearPct = 100 - bullPct;

        // Net bias score: +100 pure bull, -100 pure bear
        const netScore = bullPts - bearPts;

        let decision, decisionClass, decisionColor, confidence;
        if (netScore >= 30) { decision = '🟢 LONG'; decisionClass = 'comp-long'; decisionColor = 'var(--green)'; confidence = Math.min(99, 50 + netScore); }
        else if (netScore <= -30) { decision = '🔴 SHORT'; decisionClass = 'comp-short'; decisionColor = 'var(--red)'; confidence = Math.min(99, 50 + Math.abs(netScore)); }
        else { decision = '⚪ BEKLE'; decisionClass = 'comp-wait'; decisionColor = 'var(--yellow)'; confidence = Math.min(90, 40 + Math.abs(netScore)); }

        return { bullPts, bearPts, bullPct, bearPct, netScore, decision, decisionClass, decisionColor, confidence, factors };
      }

      // ── FORMAT ───────────────────────────────────────────────
      function fp(p) {
        if (p < 0.0001) return p.toFixed(8);
        if (p < 0.01) return p.toFixed(6);
        if (p < 1) return p.toFixed(4);
        if (p < 100) return p.toFixed(3);
        return p.toFixed(2);
      }
      function fn(n) {
        if (!n) return 'N/A';
        if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
        if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
        return n.toFixed(2);
      }
      function pct(a, b) { return ((a - b) / b * 100).toFixed(2); }

      // ── ÖZEL CANDLESTICK PLUGIN ──────────────────────────────
      function getCandlestickPlugin() {
        return {
          id: 'candlestickFallback',
          beforeDatasetsDraw(chart) {
            const { ctx, scales: { x, y } } = chart;
            const meta = chart.getDatasetMeta(0);
            if (!meta || !meta.data) return;
            const dataset = chart.data.datasets[0];
            const data = dataset.data;
            if (!data) return;
            for (let i = 0; i < meta.data.length; i++) {
              const item = data[i];
              if (!item) continue;
              const o = item.o, h = item.h, l = item.l, c = item.c;
              const xPos = x.getPixelForValue(item.x);
              const yO = y.getPixelForValue(o);
              const yC = y.getPixelForValue(c);
              const yH = y.getPixelForValue(h);
              const yL = y.getPixelForValue(l);
              const bull = c >= o;
              const color = bull ? 'rgba(0, 230, 118, 0.9)' : 'rgba(255, 23, 68, 0.9)';
              const barWidth = Math.max(3, (x.getPixelForValue(data[1]?.x) - x.getPixelForValue(data[0]?.x)) * 0.6);
              ctx.save();
              ctx.strokeStyle = color;
              ctx.lineWidth = 1.2;
              ctx.beginPath();
              ctx.moveTo(xPos, yH);
              ctx.lineTo(xPos, yL);
              ctx.stroke();
              ctx.fillStyle = color;
              const top = Math.min(yO, yC);
              const height = Math.max(1, Math.abs(yO - yC));
              ctx.fillRect(xPos - barWidth / 2, top, barWidth, height);
              ctx.restore();
            }
          }
        };
      }

      }

      function buildVerdict(rsi, macd, boll, price, fundingAnalysis, lsRatio) {
        const signals = []; let score = 0;
        if (rsi > 85) { signals.push({ t: `RSI ${rsi.toFixed(0)} — Aşırı Alım`, c: 'bear' }); score -= 2.5; }
        else if (rsi > 70) { signals.push({ t: `RSI ${rsi.toFixed(0)} — Yüksek`, c: 'warn' }); score -= 1.2; }
        else if (rsi < 30) { signals.push({ t: `RSI ${rsi.toFixed(0)} — Aşırı Satım`, c: 'bull' }); score += 2.5; }
        else if (rsi < 45) { signals.push({ t: `RSI ${rsi.toFixed(0)} — Düşük`, c: 'bull' }); score += 0.8; }
        else signals.push({ t: `RSI ${rsi.toFixed(0)} — Normal`, c: 'info' });

        if (macd) {
          if (macd.histogram < 0 && macd.macd < 0) { signals.push({ t: 'MACD Negatif — Düşüş', c: 'bear' }); score -= 1.5; }
          else if (macd.histogram > 0 && macd.macd > 0) { signals.push({ t: 'MACD Pozitif — Yükseliş', c: 'bull' }); score += 1.5; }
          else if (macd.histogram < 0) { signals.push({ t: 'MACD Zayıflıyor', c: 'warn' }); score -= 0.5; }
          else signals.push({ t: 'MACD Güçleniyor', c: 'info' });
        }

        if (boll) {
          const pos = (price - boll.lower) / (boll.upper - boll.lower);
          if (pos > 1.02) { signals.push({ t: 'Bollinger Üst Bandın Üstünde', c: 'bear' }); score -= 2.2; }
          else if (pos > 0.85) { signals.push({ t: 'Bollinger Üst Banda Yakın', c: 'warn' }); score -= 1; }
          else if (pos < -0.02) { signals.push({ t: 'Bollinger Alt Bandın Altında', c: 'bull' }); score += 2.2; }
          else if (pos < 0.15) { signals.push({ t: 'Bollinger Alt Banda Yakın', c: 'bull' }); score += 1; }
          else signals.push({ t: 'Bollinger Orta Bölge', c: 'info' });
        }

        if (fundingAnalysis) {
          const avgPct = fundingAnalysis.avg * 100;
          const slope = fundingAnalysis.slope;
          if (avgPct > 0.05 && slope > 0) { signals.push({ t: `Funding Yüksek & Artıyor (${avgPct.toFixed(3)}%)`, c: 'bear' }); score -= 2.0; }
          else if (avgPct < -0.03 && slope < 0) { signals.push({ t: `Funding Negatif & Düşüyor (${avgPct.toFixed(3)}%)`, c: 'bull' }); score += 2.0; }
          else if (avgPct > 0.05) { signals.push({ t: `Funding Yüksek (${avgPct.toFixed(3)}%)`, c: 'warn' }); score -= 1.0; }
          else if (avgPct < -0.03) { signals.push({ t: 'Funding Negatif (' + avgPct.toFixed(3) + '%)', c: 'bull' }); score += 1.0; }
        }

        if (lsRatio !== null) {
          const shortPct = (1 / (1 + lsRatio)) * 100;
          if (shortPct > 75) { signals.push({ t: `%${shortPct.toFixed(0)} Short — Squeeze Riski`, c: 'warn' }); score -= 0.5; }
          else if (shortPct > 60) { signals.push({ t: 'Short Ağırlıklı', c: 'info' }); score -= 0.3; }
        }

        let title, cls;
        if (score <= -2.5) { title = '🔴 SHORT UYGUN GÖRÜNÜYOR'; cls = 'short'; }
        else if (score >= 2.5) { title = '🟢 LONG DAHA UYGUN'; cls = 'long'; }
        else if (score <= -1) { title = '🟠 HAFİF BEARISH — DİKKAT'; cls = 'short'; }
        else if (score >= 1) { title = '🟡 HAFİF BULLISH'; cls = 'long'; }
        else { title = '⚪ BELİRSİZ — BEKLE'; cls = 'neutral'; }

        return { title, cls, signals };
      }

      function renderBoll(boll, price) {
        if (!boll) return '<div class="card-sub">Yetersiz veri</div>';
        const range = boll.upper - boll.lower;
        const pos = Math.max(0, Math.min(1, (price - boll.lower) / range));
        const midPct = (1 - (boll.mid - boll.lower) / range) * 100;
        const bw = ((boll.upper - boll.lower) / boll.mid * 100).toFixed(1);
        let comment = '';
        if (pos > 1) comment = '<span class="c-red">⚠ Üst bandın üstünde</span>';
        else if (pos > 0.85) comment = '<span class="c-yellow">Üst banda yakın</span>';
        else if (pos < 0) comment = '<span class="c-green">⚠ Alt bandın altında</span>';
        else if (pos < 0.15) comment = '<span class="c-green">Alt banda yakın</span>';
        else comment = '<span class="c-blue">Orta bölge</span>';
        return `
      <div class="boll-visual">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue)"></div>
        <div style="position:absolute;left:0;right:0;height:1px;background:var(--yellow);top:${midPct}%"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blue)"></div>
        <div style="position:absolute;left:0;right:0;height:2px;background:var(--green);box-shadow:0 0 6px var(--green);top:${(1 - pos) * 100}%;transition:top .6s"></div>
      </div>
      <div class="boll-values">
        <span><span class="c-blue" style="font-size:9px">ÜST</span><span class="c-white">${fp(boll.upper)}</span></span>
        <span style="text-align:center"><span class="c-yellow" style="font-size:9px">ORTA</span><span class="c-white">${fp(boll.mid)}</span></span>
        <span style="text-align:right"><span class="c-blue" style="font-size:9px">ALT</span><span class="c-white">${fp(boll.lower)}</span></span>
      </div>
      <div class="card-sub" style="margin-top:8px">${comment} · Bant Genişliği: %${bw}</div>
    `;
      }

      function renderSR(sr) {
        let h = '';
        sr.resistances.slice().reverse().forEach(r => {
          h += `<div class="sr-item resistance"><span class="sr-left">DİRENÇ</span><span class="sr-price c-red">${fp(r)}</span><span class="sr-dist c-red">+%${pct(r, sr.price)}</span></div>`;
        });
        h += `<div class="sr-item current"><span class="sr-left">MEVCUT FİYAT</span><span class="sr-price c-yellow">${fp(sr.price)}</span><span class="sr-dist">—</span></div>`;
        sr.supports.forEach(s => {
          h += `<div class="sr-item support"><span class="sr-left">DESTEK</span><span class="sr-price c-green">${fp(s)}</span><span class="sr-dist c-green">%${pct(s, sr.price)}</span></div>`;
        });
        if (!sr.resistances.length && !sr.supports.length) h = '<div class="card-sub">Pivot noktası bulunamadı</div>';
        return h;
      }

      // ── AI PROMPT OLUŞTURMA ──────────────────────────────────
      function generateAIPrompt() {
        const d = lastAnalysisData;
        if (!d.price) return 'Lütfen önce bir analiz yapın.';

        const na = (v, fmt) => (v !== null && v !== undefined && !isNaN(v)) ? fmt(v) : 'N/A';
        const formatPrice = (p) => na(p, fp);
        const formatPct = (p) => na(p, v => (v * 100).toFixed(4) + '%');

        // ── EMA Hesapla (20 / 50 / 200) ─────────────────────
        const closes = d.closesTF || [];
        const closes1d = d.closes1d || [];
        const longCloses = closes1d.length >= 200 ? closes1d : closes;

        const ema20arr = closes.length >= 20 ? window.chartEngine.calcEMA(closes, 20) : [];
        const ema50arr = longCloses.length >= 50 ? window.chartEngine.calcEMA(longCloses, 50) : [];
        const ema200arr = longCloses.length >= 200 ? window.chartEngine.calcEMA(longCloses, 200) : [];

        const ema20 = ema20arr.filter(v => v !== null).slice(-1)[0] || null;
        const ema50 = ema50arr.filter(v => v !== null).slice(-1)[0] || null;
        const ema200 = ema200arr.filter(v => v !== null).slice(-1)[0] || null;

        const trendDesc = ema20
          ? (d.price > ema20
            ? (ema50 && d.price > ema50 ? 'Güçlü Yükseliş (EMA20 & EMA50 üstünde)' : 'Kısa vadeli Yükseliş (EMA20 üstünde)')
            : (ema50 && d.price < ema50 ? 'Güçlü Düşüş (EMA20 & EMA50 altında)' : 'Kısa vadeli Düşüş (EMA20 altında)'))
          : 'N/A';

        // ── Market Structure ─────────────────────────────────
        let structure = 'N/A';
        if (d.supports && d.resistances && d.supports.length && d.resistances.length) {
          if (d.price > d.resistances[0]) structure = 'Breakout Yukarı (Boğa)';
          else if (d.price < d.supports[0]) structure = 'Breakout Aşağı (Ayı)';
          else if (ema20 && ema50 && ema20 > ema50) structure = 'Higher High / Higher Low (Yükseliş Yapısı)';
          else if (ema20 && ema50 && ema20 < ema50) structure = 'Lower High / Lower Low (Düşüş Yapısı)';
          else structure = 'Konsolidasyon / Yatay';
        }

        // ── MACD Detayı ──────────────────────────────────────
        let macdDesc = 'N/A';
        if (d.macd) {
          const m = d.macd;
          const dir = m.histogram > 0 ? 'Yükseliş' : 'Düşüş';
          const mom = Math.abs(m.histogram) > Math.abs(m.signal * 0.1) ? 'Güçlü' : 'Zayıf';
          macdDesc = `${dir} momentumu (${mom}) | MACD: ${m.macd.toFixed(5)} | Sinyal: ${m.signal.toFixed(5)} | Histogram: ${m.histogram.toFixed(5)}`;
        }

        // ── Volatilite ───────────────────────────────────────
        const volatility = d.volatility ? d.volatility.toFixed(2) + '%' : 'N/A';

        // ── Funding + OI Diverjansı ──────────────────────────
        let fOIDiv = 'Nötr — Uyumlu hareket';
        const fa = d.fundingAvg || 0;
        const oi = d.oiChange || 0;
        if (oi > 0 && fa > 0.0003) fOIDiv = 'OI ↑ + Funding Pozitif → Long birikimi, dikkat';
        else if (oi > 0 && fa < -0.0003) fOIDiv = 'OI ↑ + Funding Negatif → Short birikimi, squeeze riski';
        else if (oi < 0 && fa > 0.0003) fOIDiv = 'OI ↓ + Funding Pozitif → Longlar kaçıyor, düşüş yavaşlayabilir';
        else if (oi < 0 && fa < -0.0003) fOIDiv = 'OI ↓ + Funding Negatif → Shortlar kapanıyor, dip olabilir';

        // ── Hacim & Breakout ─────────────────────────────────
        let volumeTrend = 'Hacim ortalamaya yakın, belirgin sinyal yok.';
        if (d.volumeSpike) {
          volumeTrend = d.chg24 > 0
            ? `Hacim sıçraması (${d.spikeRatio.toFixed(1)}x) + Fiyat yukarı → Güçlü alım baskısı`
            : `Hacim sıçraması (${d.spikeRatio.toFixed(1)}x) + Fiyat aşağı → Güçlü satış baskısı`;
        }

        let breakout = 'Günlük aralık içinde (belirsiz).';
        const hRange = d.highDay - d.lowDay;
        const pricePos = hRange > 0 ? ((d.price - d.lowDay) / hRange) * 100 : 50;
        if (pricePos >= 95) breakout = `Günlük zirveye yakın (%${pricePos.toFixed(0)} aralıkta) — Direnç bölgesi.`;
        else if (pricePos <= 5) breakout = `Günlük dibe yakın (%${pricePos.toFixed(0)} aralıkta) — Destek bölgesi.`;
        else breakout = `Günlük aralığın %${pricePos.toFixed(0)}'inde. `;

        let impulse = 'Yok — Normal mum aktivitesi.';
        if (d.volumeSpike && d.chg24 > 1) impulse = `Büyük alım mumu + hacim sıçraması (${d.spikeRatio.toFixed(1)}x).`;
        else if (d.volumeSpike && d.chg24 < -1) impulse = `Büyük satış mumu + hacim sıçraması (${d.spikeRatio.toFixed(1)}x).`;
        else if (d.volumeSpike) impulse = `Hacim sıçraması tespit edildi (${d.spikeRatio.toFixed(1)}x), yön belirsiz.`;

        // ── RSI Değerlendirmesi ──────────────────────────────
        const rsiVal = d.rsi ? d.rsi.toFixed(1) : 'N/A';
        const rsiDesc = d.rsi
          ? (d.rsi > 85 ? '⚠ Aşırı alım (kritik)' : d.rsi > 70 ? 'Aşırı alım bölgesi' : d.rsi < 20 ? '⚠ Aşırı satım (kritik)' : d.rsi < 30 ? 'Aşırı satım bölgesi' : 'Normal bölge')
          : 'N/A';

        // ── Long/Short Bias ───────────────────────────────────
        let lsDesc = 'N/A';
        if (d.longPct && d.shortPct) {
          const bias = d.longPct > d.shortPct ? 'Long ağırlıklı' : 'Short ağırlıklı';
          lsDesc = `Long %${d.longPct.toFixed(1)} / Short %${d.shortPct.toFixed(1)} → ${bias}`;
          if (d.shortPct > 75) lsDesc += ' ⚠ Short squeeze riski yüksek!';
        }

        // ── OI Detayı ─────────────────────────────────────────
        const oiDesc = na(d.oiChange, v => {
          const dir = v > 0 ? '↑ Artıyor' : '↓ Azalıyor';
          const conf = (d.chg24 > 0 && v > 0) ? 'Trendle uyumlu (güçlü)' : (d.chg24 < 0 && v < 0) ? 'Trendle uyumlu (zayıflama)' : 'Trendle uyumsuz (dikkat)';
          return `${v > 0 ? '+' : ''}${v.toFixed(2)}% ${dir} — ${conf}`;
        });

        // ── Final Prompt ──────────────────────────────────────
        return `📊 MARKET DATA
Pair: ${currentSymbol}
Timeframe: ${currentTF}
Analysis Time: ${d.analysisTime ? new Date(d.analysisTime).toLocaleString('tr-TR') : 'N/A'}
Last Candle Close: ${d.candleTimestamp ? new Date(d.candleTimestamp).toLocaleString('tr-TR') : 'N/A'}
Current Price: ${formatPrice(d.price)}
24h Change: ${na(d.chg24, v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%')}
Recent High: ${formatPrice(d.highDay)}
Recent Low: ${formatPrice(d.lowDay)}
Volatility: ${volatility}

📈 TECHNICAL INDICATORS
Trend: ${trendDesc}
EMA20: ${na(ema20, v => fp(v) + (d.price > v ? ' (Fiyat üstünde ✅)' : ' (Fiyat altında ❌)'))}
EMA50: ${na(ema50, v => fp(v) + (d.price > v ? ' (Fiyat üstünde ✅)' : ' (Fiyat altında ❌)'))}
EMA200: ${na(ema200, v => fp(v) + (d.price > v ? ' (Fiyat üstünde ✅)' : ' (Fiyat altında ❌)'))}
RSI: ${rsiVal} — ${rsiDesc}
MACD: ${macdDesc}
Support Levels: ${d.supports && d.supports.length ? d.supports.map(fp).join(' | ') : 'N/A'}
Resistance Levels: ${d.resistances && d.resistances.length ? d.resistances.map(fp).join(' | ') : 'N/A'}

      async function analyze() {
        const raw = document.getElementById('coinInput').value.trim().replace(/USDT$/i, '').toUpperCase();
        if (!raw) return;
        currentSymbol = raw + 'USDT';

        // Chart engine kontrolü
        if (!window.chartEngine || typeof window.chartEngine.buildCharts !== 'function') {
          console.error('Chart engine mevcut değil!');
          const err = document.getElementById('errorMsg');
          err.textContent = '⚠ Grafik motoru yüklenmedi. Sayfayı yenileyin.';
          err.style.display = 'block';
          return;
        }

        const btn = document.getElementById('analyzeBtn');
        btn.disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('output').innerHTML = '';
        document.getElementById('verdict').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('chartPanel').style.display = 'none';
        document.getElementById('refreshRow').style.display = 'none';

        // Chart destroy'ı güvenli yap
        try {
          window.chartEngine.destroyCharts();
        } catch (error) {
          console.error('Chart destroy hatası:', error);
        }

        try {
          // Coingecko ID eşleştirme (BTC -> bitcoin gibi)
          let geckoId = raw.toLowerCase();
          const commonIds = {
            'BTC': 'bitcoin', 'ETH': 'ethereum', 'BNB': 'binancecoin', 'SOL': 'solana',
            'XRP': 'ripple', 'ADA': 'cardano', 'AVAX': 'avalanche-2', 'DOT': 'polkadot',
            'MATIC': 'polygon', 'TRX': 'tron', 'LINK': 'chainlink', 'BCH': 'bitcoin-cash',
            'LTC': 'litecoin', 'NEAR': 'near', 'ATOM': 'cosmos', 'UNI': 'uniswap',
            'ETC': 'ethereum-classic', 'FIL': 'filecoin', 'ICP': 'internet-computer'
          };

          if (commonIds[raw]) {
            geckoId = commonIds[raw];
          } else {
            try {
              const sRes = await fetch(`${CMC_PROXY}/search?query=${raw}`).then(r => r.json());
              if (sRes.coins && sRes.coins.length > 0) geckoId = sRes.coins[0].id;
            } catch (e) { }
          }

          // Zaman dilimine göre uygun limit belirle
          function getLimitForTF(tf) {
            const limits = {
              '15m': 200,   // ~2 gün
              '1h': 120,    // ~5 gün  
              '4h': 120,    // ~20 gün
              '1d': 120,    // ~4 ay
              '1w': 100,    // ~2 yil
              '1M': 60      // ~5 yil
              // 1Y Binance tarafindan desteklenmiyor
            };
            return limits[tf] || 120;
          }

          
          // API calls with individual error handling to prevent complete failure
          const fetchWithErrorHandling = async (url, description) => {
            try {
              const response = await fetch(url);
              if (!response.ok) throw new Error(`${description}: ${response.status}`);
              return await response.json();
            } catch (error) {
              console.error(`API hatası (${description}):`, error);
              return null; // Return null instead of failing the entire operation
            }
          };

          const [ticker, oiCurrent, oiHist, lsRaw, fundingRaw, klines1d, klinesTF, klines4h, liqRaw, klines15m, klines1h, klines1w] = await Promise.all([
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/ticker/24hr?symbol=${currentSymbol}`, 'Ticker'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/openInterest?symbol=${currentSymbol}`, 'Open Interest'),
            fetchWithErrorHandling(`${BASE_F}/futures/data/openInterestHist?symbol=${currentSymbol}&period=5m&limit=2`, 'OI History'),
            fetchWithErrorHandling(`${BASE_F}/futures/data/topLongShortAccountRatio?symbol=${currentSymbol}&period=5m&limit=1`, 'LS Account Ratio'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/fundingRate?symbol=${currentSymbol}&limit=8`, 'Funding Rate'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=1d&limit=220`, '1D Klines'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=${currentTF}&limit=${getLimitForTF(currentTF)}`, `${currentTF} Klines`),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=4h&limit=60`, '4H Klines'),
            fetchWithErrorHandling(`${BASE_F}/futures/data/topLongShortPositionRatio?symbol=${currentSymbol}&period=5m&limit=1`, 'LS Position Ratio'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=15m&limit=100`, '15M Klines'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=1h&limit=100`, '1H Klines'),
            fetchWithErrorHandling(`${BASE_F}/fapi/v1/klines?symbol=${currentSymbol}&interval=1w&limit=50`, '1W Klines'),
          ]);

          if (!ticker || ticker.code) throw new Error('Coin bulunamadı: ' + currentSymbol);

          let geckoData = null;
          try {
            const gRes = await fetch(`${CMC_PROXY}/coins/${geckoId}?localization=false&tickers=false&community_data=false&developer_data=false`);
            if (gRes.ok) geckoData = await gRes.json();
          } catch (e) { }

          const price = parseFloat(ticker.lastPrice);
          const chg24 = parseFloat(ticker.priceChangePercent);
          const vol24 = parseFloat(ticker.quoteVolume);
          const highDay = parseFloat(ticker.highPrice);
          const lowDay = parseFloat(ticker.lowPrice);

          // Klines verisi kontrolü - en kritik veri
          if (!klinesTF || !Array.isArray(klinesTF) || klinesTF.length === 0) {
            console.error('KlinesTF verisi hatası:', klinesTF);
            throw new Error(`${currentTF} zaman dilimi için grafik verisi alınamadı. Lütfen tekrar deneyin.`);
          }

          // Diğer kritik verilerin kontrolü
          if (!klines1d || !Array.isArray(klines1d)) {
            console.warn('1D klines verisi alınamadı, bazı analizler eksik olabilir');
          }

          const currentOI = oiCurrent ? parseFloat(oiCurrent.openInterest) : 0;
          let prevOI = currentOI;
          let oiChange = 0;
          if (oiCurrent && Array.isArray(oiHist) && oiHist.length >= 2) {
            prevOI = parseFloat(oiHist[1].sumOpenInterest);
            oiChange = ((currentOI - prevOI) / prevOI) * 100;
          }
          const openIntValue = currentOI * price;

          const lsRatio = Array.isArray(lsRaw) && lsRaw.length ? parseFloat(lsRaw[0].longShortRatio) : null;

          const fundingAnalysis = analyzeFundingTrend(fundingRaw || []);
          const lastFunding = (fundingAnalysis && fundingAnalysis.values && fundingAnalysis.values.length > 0) ? fundingAnalysis.values[fundingAnalysis.values.length - 1] : 0;

          let liqLong = null, liqShort = null;
          if (Array.isArray(liqRaw) && liqRaw.length) {
            const posRatio = parseFloat(liqRaw[0].longShortRatio);
            liqShort = openIntValue / (1 + posRatio);
            liqLong = openIntValue - liqShort;
          }

          const closes1d = (klines1d && Array.isArray(klines1d)) ? klines1d.map(k => parseFloat(k[4])) : [];
          const closesTF = klinesTF.map(k => parseFloat(k[4]));
          const closes4h = (klines4h && Array.isArray(klines4h)) ? klines4h.map(k => parseFloat(k[4])) : [];
          const volumesTF = klinesTF.map(k => parseFloat(k[5]));

          let volatility = null;
          if (klinesTF.length >= 20) {
            const ranges = klinesTF.slice(-20).map(k => (parseFloat(k[2]) - parseFloat(k[3])) / parseFloat(k[4]) * 100);
            volatility = ranges.reduce((a, b) => a + b, 0) / 20;
          }

          const rsi = calcSingleRSI(closesTF) || calcSingleRSI(closes1d);
          const rsi4h = calcSingleRSI(closes4h);

          const macd = calcSingleMACD(closes1d) || calcSingleMACD(closesTF);
          const boll = calcSingleBollinger(closes1d) || calcSingleBollinger(closesTF);
          const sr = calcSR(klines1d, klinesTF);

          let volumeSpike = false, spikeRatio = 0;
          if (volumesTF.length >= 21) {

            const avgVol = volumesTF.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
            spikeRatio = lastVol / avgVol;
            volumeSpike = spikeRatio >= 2.0;
          }

          const mktCap = geckoData?.market_data?.market_cap?.usd || null;
          const circSupply = geckoData?.market_data?.circulating_supply || null;
          const maxSupply = geckoData?.market_data?.max_supply || null;
          const ath = geckoData?.market_data?.ath?.usd || null;

          const fHistory = (fundingRaw && Array.isArray(fundingRaw)) ? fundingRaw.slice().reverse() : [];

          const verdict = buildVerdict(rsi, macd, boll, price, fundingAnalysis, lsRatio);
          const vEl = document.getElementById('verdict');

            const lastVol = vols[vols.length - 1];
            const lastTakerVol = takerVols[takerVols.length - 1];
            const delta = lastTakerVol - (lastVol - lastTakerVol);

            const avgVol = vols.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
            const volTrend = lastVol > avgVol * 1.5 ? 'Volume Spike' : (lastVol > avgVol ? 'Increasing' : 'Stable');

            return {
              rsi: rsiVal,
              ema20: e20, ema50: e50,
              macd: macdVal || { macd: 0, signal: 0, histogram: 0 },
              smc: { trend: ms.trend, choch: ms.choch, bos: ms.bos },
              sr: { supports: srVal.supports, resistances: srVal.resistances },
              volTrend,
              volAmount: lastVol,
              avgVol: avgVol,
              delta: delta
            };

          const getWeeklyData = (klines) => {
            if (!klines || klines.length < 1) return null;
            const cls = klines.map(k => parseFloat(k[4]));

            const trend = e20 ? (cls[cls.length - 1] > e20 ? 'BULLISH' : 'BEARISH') : (count < 20 ? 'INSUFFICIENT DATA' : 'NEUTRAL');
            const srVal = calcSR(klines, klines);
            return {
              count,
              trend,
              closes: cls.slice(-3),
              rsi: rsiVal ? rsiVal.toFixed(1) : 'N/A',
              ema20: e20,
              sr: { supports: srVal.supports, resistances: srVal.resistances }

          lastAnalysisData = {
            price, chg24, highDay, lowDay, volatility,

            supports: cleanSupports, resistances: cleanResistances,
            fundingAvg: fundingAnalysis?.avg || 0, fundingComment: fundingAnalysis?.comment || '',
            oiChange, longPct, shortPct,
            volumeSpike, spikeRatio,
            closesTF, closes1d,
            klinesTF,
            analysisTime: new Date().toISOString(),
            candleTimestamp: klinesTF.length ? new Date(klinesTF[klinesTF.length - 1][0]).toISOString() : null,
            multiTF: {

          const lhResult = detectLiquidityHunt({
            klines: klinesTF,
            closes: closesTF,
            rsi, rsiPrev,
            oiChange, chg24,

            volumeSpike, spikeRatio,

            resistances: sr.resistances,
            price, highDay, lowDay
          });
          lastAnalysisData.lhResult = lhResult;

          // ── MARKET STRUCTURE (SMC) ───────────────────────────
          const msResult = classifyMarketStructure(klinesTF);
          lastAnalysisData.msResult = msResult;

          // ── FUNDING + OI DIVERGENCE ENGINE ──────────────────
          const foiResult = analyzeFundingOIDivergence({
            fundingAvg: fundingAnalysis?.avg || 0,
            fundingSlope: fundingAnalysis?.slope || 0,
            oiChange, chg24,
            longPct, shortPct
          });
          lastAnalysisData.foiResult = foiResult;

          // ── KOMPOZİT SKOR ───────────────────────────────────
          const csResult = calcCompositeScore({
            rsi, rsi4h, macd, boll, price,
            fundingAvg: fundingAnalysis?.avg || 0,
            oiChange, chg24,
            supports: sr.supports, resistances: sr.resistances,
            lhResult, msResult, foiResult,
            volumeSpike, spikeRatio,
            longPct, shortPct
          });
          lastAnalysisData.csResult = csResult;

          // ── MERKEZİ KARAR MOTORU V5 ENTEGRASYONU
          if (window.kararMotoru && typeof window.kararMotoru === 'function') {
            try {
              const v5Data = {
                symbol: currentSymbol,
                price: price,
                chg24: chg24,
                volatility: volatility,
                rsi: rsi,
                macd: macd,
                boll: boll,
                supports: sr.supports,
                resistances: sr.resistances,
                fundingAvg: fundingAnalysis?.avg || 0,
                oiChange: oiChange,
                longPct: longPct,
                shortPct: shortPct,
                volumeSpike: volumeSpike,
                spikeRatio: spikeRatio,
                lhResult: lhResult,
                msResult: msResult,
                analysisTime: new Date().toISOString(),
                multiTF: lastAnalysisData.multiTF
              };
              
              const v5Result = window.kararMotoru(v5Data);
              renderV5Decision(v5Result);
            } catch (e) {
              console.error('V5 Motor Hatası:', e);
              document.getElementById('verdictV5Content').innerHTML = `<div class="text-premium-red text-[10px] font-bold">⚠️ V5 ANALİZ HATASI: ${e.message}</div>`;
            }
          }

          // YEREL MOTOR (V3) ÇALIŞTIR
          if (typeof window.localKararMotoru === 'function') {
             try { window.localKararMotoru(lastAnalysisData); } catch(e) {}
          }

        ${volumeSpikeHtml}

          else { shortPuan += 10; sinyaller.push({ tip: 'negatif', ikon: '🔵', baslik: 'BOS — Yapı Kırıldı (Aşağı)', ac: `${msResult.bos.detail}. Düşüş trendi devam ediyor.` }); }
        }
      }

      if (lhResult && lhResult.score >= 60) {
        if (lhResult.liqSide === 'sell-side') { longPuan += 15; sinyaller.push({ tip: 'pozitif', ikon: '💣', baslik: 'Stop Hunt — Yukarı Dönüş Bekleniyor', ac: `Likidite avı skoru ${lhResult.score}/100. Sell-side likidite alındı, piyasa yukarı döndürülmeye hazır.` }); }
        else if (lhResult.liqSide === 'buy-side') { shortPuan += 15; sinyaller.push({ tip: 'negatif', ikon: '💣', baslik: 'Stop Hunt — Aşağı Dönüş Bekleniyor', ac: `Likidite avı skoru ${lhResult.score}/100. Buy-side likidite alındı, aşağı dönüş bekleniyor.` }); }

      // Karar
      const fark = longPuan - shortPuan;
      const toplamPuan = longPuan + shortPuan;
      const longOran = toplamPuan > 0 ? (longPuan / toplamPuan * 100) : 50;
      const shortOran = 100 - longOran;
      let karar, kararSinif, guven;
      if (fark >= 35) { karar = 'LONG'; kararSinif = 'long'; guven = Math.min(90, 55 + (fark - 35) * 0.7); }
      else if (fark <= -35) { karar = 'SHORT'; kararSinif = 'short'; guven = Math.min(90, 55 + (Math.abs(fark) - 35) * 0.7); }
      else { karar = 'BEKLE'; kararSinif = 'bekle'; guven = Math.max(30, 50 - Math.abs(fark) * 0.5); }

      let riskSkor = 5;
      if (rsi > 85 || rsi < 20) riskSkor += 2;
      if (Math.abs(fPct) > 0.1) riskSkor += 1;
      if (volatility > 5) riskSkor += 1;

      if (lhResult && lhResult.score >= 60) riskSkor -= 1;

      riskSkor = Math.max(1, Math.min(10, riskSkor));

      const guvenRenk = guven >= 70 ? 'var(--green)' : guven >= 50 ? 'var(--yellow)' : 'var(--orange)';

      // Seviyeler
      let girisZon = '—', slSeviye = '—', slPct = '—', tp1 = '—', tp2 = '—';
      // LONG: supports fiyatın altında (büyükten küçüğe sıralı), resistances fiyatın üstünde (küçükten büyüğe)
      // Güvenlik: supports[0] kesinlikle price'dan küçük olmalı, resistances[0] kesinlikle price'dan büyük olmalı
      const destekler = (supports || []).filter(s => s < price).sort((a, b) => b - a);
      const direncler = (resistances || []).filter(r => r > price).sort((a, b) => a - b);
      const enYakinDestek = destekler.length ? destekler[0] : null;
      const enYakinDirenc = direncler.length ? direncler[0] : null;
      if (karar === 'LONG') {
        // Giriş zonu: her zaman mevcut fiyat etrafında (boll.mid fiyattan çok uzaksa kullanma)
        const emaProxy = (boll && Math.abs(boll.mid - price) / price < 0.15) ? boll.mid * 0.98 : price * 0.97;
        girisZon = price > emaProxy * 1.03 ? `${fp_km(emaProxy)}–${fp_km(emaProxy * 1.02)} (Pullback)` : `${fp_km(price * 0.99)}–${fp_km(price)}`;
        // SL: fiyatın ALTINDA — destek seviyesinin %0.5 altı veya fiyatın %3-5 altı
        // Makul max SL mesafesi %15 ile sınırla
        let slLong = enYakinDestek ? enYakinDestek * 0.995 : price * 0.95;

        slSeviye = fp_km(slLong); slPct = `%${pct_km(slLong, price)}`;
        // TP: fiyatın ÜSTÜNDE — direnç seviyesi veya fiyatın %5-%10 üstü
        // Makul TP: fiyatın %50'sinden uzak olmasın
