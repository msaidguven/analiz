        oiChange, longPct, shortPct,
        volumeSpike, spikeRatio,
        lhResult, msResult,
        analysisTime, multiTF, symbol,
      } = d;

      const sinyaller = [];
      const catismalar = [];

      // Yeni coin tespiti
      let yeniCoin = false;
      if (!multiTF || !multiTF['1w']) yeniCoin = true;
      if (multiTF && multiTF['1w']) {
        if ((multiTF['1w'].count !== undefined && multiTF['1w'].count < 10) ||
            (multiTF['1w'].closes && multiTF['1w'].closes.length < 10)) {
          yeniCoin = true;
        }
      }

      // TF puanlarý
      const tfSonuclar = {};
      const tfListesi = ['15m','1h','4h','1d','1w'];

      tfListesi.forEach(tf => {
        const tfData = multiTF ? multiTF[tf] : null;
        tfSonuclar[tf] = tfPuanHesapla(tf, tfData, d);
      });

      // Aðýrlýklý toplam puan
      let agirlikliLong = 0, agirlikliShort = 0;
      const efektifAgirlik = { ...TF_AGIRLIK };
      if (yeniCoin) {
        efektifAgirlik['1d'] += efektifAgirlik['1w'];
        efektifAgirlik['1w'] = 0;
      }

      tfListesi.forEach(tf => {
        const agirlik = efektifAgirlik[tf];
        if (agirlik === 0) return;
        const sonuc = tfSonuclar[tf];
        if (!sonuc || (sonuc.long === 0 && sonuc.short === 0)) return;

        const tfToplam = sonuc.long + sonuc.short;
        const tfLongOran = tfToplam > 0 ? sonuc.long / tfToplam : 0.5;
        const tfShortOran = 1 - tfLongOran;

        agirlikliLong  += tfLongOran  * agirlik;
        agirlikliShort += tfShortOran * agirlik;
      });

      const toplamAgirlikli = agirlikliLong + agirlikliShort;
      const unifiedLongOran  = toplamAgirlikli > 0 ? (agirlikliLong  / toplamAgirlikli * 100) : 50;
      const unifiedShortOran = 100 - unifiedLongOran;

      // Türev verileri
      let turevLong = 0, turevShort = 0;
      const fPct = (fundingAvg || 0) * 100;
      
      if (fPct < -0.30)      { turevLong  += 25; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Ekstrem Short Tuzaðý`, aciklama:'Aþýrý negatif funding. Short squeeze riski maksimum.' }); }
      else if (fPct < -0.10) { turevLong  += 20; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Aþýrý Negatif`, aciklama:'Short birikimi kritik seviyede.' }); }
      else if (fPct < -0.03) { turevLong  += 10; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Negatif`, aciklama:'Short squeeze potansiyeli var.' }); }
      else if (fPct >  0.30) { turevShort += 25; sinyaller.push({ tip:'negatif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Ekstrem Long Tuzaðý`, aciklama:'Aþýrý pozitif funding. Long tasfiye riski yüksek.' }); }
      else if (fPct >  0.10) { turevShort += 20; sinyaller.push({ tip:'negatif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Aþýrý Pozitif`, aciklama:'Long kalabalýðý tehlikeli.' }); }
      else if (fPct >  0.05) { turevShort += 10; sinyaller.push({ tip:'uyari',   ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Yüksek`, aciklama:'Long kalabalýðý artýyor.' }); }

      if (shortPct > 75)     { turevLong  += 18; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`%${shortPct.toFixed(1)} Short â Squeeze Yakýt Hazýr`, aciklama:'Kalabalýk short pozisyonlarý squeeze riski oluþturuyor.' }); }
      else if (shortPct > 60){ turevLong  +=  8; sinyaller.push({ tip:'uyari',   ikon:'â', baslik:`Short Aðýrlýklý (%${shortPct.toFixed(1)})`, aciklama:'Squeeze riski mevcut.' }); }
    }

    // Karar panelini popup sonuçlarla doldur - tam detaylý
    function updateKararPanelWithResults(data) {
      try {
        // Karar motoru mantýðýný doðrudan burada çalýþtýr
        const {
          price, chg24, volatility,
          rsi: rsiGlobal, macd: macdGlobal, boll,
          supports, resistances,
          fundingAvg,
          oiChange, longPct, shortPct,
          volumeSpike, spikeRatio,
          lhResult, msResult,
          analysisTime, multiTF, symbol,
        } = data;

        const sinyaller = [];
        const catismalar = [];

        // Yeni coin tespiti
        let yeniCoin = false;
        if (!multiTF || !multiTF['1w']) yeniCoin = true;

        // TF puanlarý
        const tfSonuclar = {};
        const tfListesi = ['15m','1h','4h','1d','1w'];

        tfListesi.forEach(tf => {
          const tfData = multiTF ? multiTF[tf] : null;
          tfSonuclar[tf] = tfPuanHesapla(tf, tfData, data);
        });

        // Aðýrlýklý toplam puan
        let agirlikliLong = 0, agirlikliShort = 0;
        const efektifAgirlik = { '15m': 5, '1h': 10, '4h': 25, '1d': 35, '1w': 25 };
        
        if (yeniCoin) {
          efektifAgirlik['1d'] += efektifAgirlik['1w'];
          efektifAgirlik['1w'] = 0;
        }

        tfListesi.forEach(tf => {
          const agirlik = efektifAgirlik[tf];
          if (agirlik === 0) return;
          const sonuc = tfSonuclar[tf];
          if (!sonuc || (sonuc.long === 0 && sonuc.short === 0)) return;

          const tfToplam = sonuc.long + sonuc.short;
          const tfLongOran = tfToplam > 0 ? sonuc.long / tfToplam : 0.5;
          const tfShortOran = 1 - tfLongOran;

          agirlikliLong  += tfLongOran  * agirlik;
          agirlikliShort += tfShortOran * agirlik;
        });

        const toplamAgirlikli = agirlikliLong + agirlikliShort;
        const unifiedLongOran  = toplamAgirlikli > 0 ? (agirlikliLong  / toplamAgirlikli * 100) : 50;
        const unifiedShortOran = 100 - unifiedLongOran;

        // Türev verileri
        let turevLong = 0, turevShort = 0;
        const fPct = (fundingAvg || 0) * 100;
        
        if (fPct < -0.30)      { turevLong  += 25; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Ekstrem Short Tuzaðý`, aciklama:'Aþýrý negatif funding. Short squeeze riski maksimum.' }); }
        else if (fPct < -0.10) { turevLong  += 20; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Aþýrý Negatif`, aciklama:'Short birikimi kritik seviyede.' }); }
        else if (fPct < -0.03) { turevLong  += 10; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Negatif`, aciklama:'Short squeeze potansiyeli var.' }); }
        else if (fPct >  0.30) { turevShort += 25; sinyaller.push({ tip:'negatif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Ekstrem Long Tuzaðý`, aciklama:'Aþýrý pozitif funding. Long tasfiye riski yüksek.' }); }
        else if (fPct >  0.10) { turevShort += 20; sinyaller.push({ tip:'negatif', ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Aþýrý Pozitif`, aciklama:'Long kalabalýðý tehlikeli.' }); }
        else if (fPct >  0.05) { turevShort += 10; sinyaller.push({ tip:'uyari',   ikon:'â', baslik:`Funding %${fPct.toFixed(4)} â Yüksek`, aciklama:'Long kalabalýðý artýyor.' }); }

        if (shortPct > 75)     { turevLong  += 18; sinyaller.push({ tip:'pozitif', ikon:'â', baslik:`%${shortPct.toFixed(1)} Short â Squeeze Yakýt Hazýr`, aciklama:'Kalabalýk short pozisyonlarý squeeze riski oluþturuyor.' }); }
        else if (shortPct > 60){ turevLong  +=  8; sinyaller.push({ tip:'uyari',   ikon:'â', baslik:`Short Aðýrlýklý (%${shortPct.toFixed(1)})`, aciklama:'Squeeze riski mevcut.' }); }
        else if (longPct > 75) { turevShort += 18; catismalar.push(`%${longPct.toFixed(1)} long kalabalýðý â tasfiye riski.`); sinyaller.push({ tip:'negatif', ikon:'â', baslik:`Long Kalabalýðý (%${longPct.toFixed(1)}) â Tasfiye Riski`, aciklama:'Düþüþte cascade tasfiye hýzlanýr.' }); }
        else if (longPct > 65) { turevShort += 10; sinyaller.push({ tip:'uyari',   ikon:'â', baslik:`Long Aðýrlýklý (%${longPct.toFixed(1)})`, aciklama:'Long kalabalýðý artýyor.' }); }

        // Final birleþtirme
        const turevToplam = turevLong + turevShort;
        const turevLongOran = turevToplam > 0 ? (turevLong / turevToplam * 100) : 50;
        const finalLongOran  = (unifiedLongOran  * 0.60) + (turevLongOran  * 0.40);
        const finalShortOran = 100 - finalLongOran;
        const fark = finalLongOran - finalShortOran;

        // Karar
        let karar, kararSinif, guven;
        if (fark >= 15)       { karar='LONG';  kararSinif='long';  guven = Math.min(90, 50 + (fark-15)*0.8); }
        else if (fark <= -15) { karar='SHORT'; kararSinif='short'; guven = Math.min(90, 50 + (Math.abs(fark)-15)*0.8); }
        else                  { karar='BEKLE'; kararSinif='bekle'; guven = Math.max(30, 50 - Math.abs(fark)*1.2); }

        if (yeniCoin) guven = Math.min(guven, 55);
        if (catismalar.length >= 2) guven = Math.min(guven, 60);
        if (catismalar.length >= 4) guven = Math.min(guven, 45);
        guven = Math.round(guven);

        const guvenRenk = guven >= 70 ? 'var(--green)' : guven >= 50 ? 'var(--yellow)' : 'var(--orange)';

        // Risk skor
        let riskSkor = 4;
        if (rsiGlobal > 90 || rsiGlobal < 10) riskSkor += 3;
        else if (rsiGlobal > 80 || rsiGlobal < 20) riskSkor += 2;
        else if (rsiGlobal > 70 || rsiGlobal < 30) riskSkor += 1;
        if (Math.abs(fPct) > 0.3) riskSkor += 2;
        else if (Math.abs(fPct) > 0.1) riskSkor += 1;
        if (volatility > 10) riskSkor += 2;
        else if (volatility > 5) riskSkor += 1;
        if (catismalar.length >= 2) riskSkor += 1;
        if (yeniCoin) riskSkor += 2;
        if (lhResult && lhResult.score >= 60) riskSkor -= 1;
        riskSkor = Math.max(1, Math.min(10, riskSkor));

        // Seviyeler
        const targetS = supports || [];
        const targetR = resistances || [];
        let girisZon='â', slSeviye='â', slPct_='â', tp1='â', tp2='â';

        if (karar === 'LONG') {
          const ema20Proxy = boll ? boll.mid * 0.98 : price * 0.97;
          girisZon = price > ema20Proxy * 1.03 ? `${fp_km(ema20Proxy)} (Pullback bekle)` : `${fp_km(price*0.995)}â${fp_km(price)}`;
          const enYakinDestek = targetS.length ? targetS[0] : price * 0.95;
          slSeviye = fp_km(enYakinDestek * 0.99);
          slPct_ = `%${pct_km(enYakinDestek*0.99, price)}`;
          tp1 = targetR.length >= 1 ? fp_km(targetR[0]) : fp_km(price*1.05);
          tp2 = targetR.length >= 2 ? fp_km(targetR[1]) : fp_km(price*1.10);
        } else if (karar === 'SHORT') {
          const enYakinDirenc = targetR.length ? targetR[0] : price * 1.03;
          girisZon = price < enYakinDirenc * 0.97 ? `${fp_km(price)}â${fp_km(price*1.01)} (Mevcut)` : `${fp_km(enYakinDirenc*0.99)}â${fp_km(enYakinDirenc)}`;
          slSeviye = fp_km(enYakinDirenc * 1.01);
          slPct_ = `%${pct_km(enYakinDirenc*1.01, price)}`;
          tp1 = targetS.length >= 1 ? fp_km(targetS[0]) : fp_km(price*0.95);
          tp2 = targetS.length >= 2 ? fp_km(targetS[1]) : fp_km(price*0.90);
        }

        // Karar panelini popup gibi güncelle
        const kararIcerik = document.getElementById('kararIcerik');
        if (kararIcerik) {
          let riskSinif = riskSkor >= 8 ? 'risk-crit' : riskSkor >= 6 ? 'risk-high' : riskSkor >= 4 ? 'risk-mid' : 'risk-low';

          kararIcerik.innerHTML = `
            <div class="karar-karti ${kararSinif}">
              <div class="karar-ust">
                <div>
                  <div class="karar-etiket">Unified MTF Kararý v3</div>
                  <div class="karar-baslik ${kararSinif}">${karar==='LONG'?'â LONG':karar==='SHORT'?'â SHORT':'â BEKLE'}</div>
                  <div style="font-size:10px;color:var(--text2);margin-top:4px">MTF Birleþik · Long %${finalLongOran.toFixed(0)} · Short %${finalShortOran.toFixed(0)}</div>
                </div>
                <div class="risk-badge">
                  <div class="risk-label">Risk</div>
                  <div class="risk-daire ${riskSinif}">${riskSkor}/10</div>
                </div>
              </div>

              <div class="guven-wrap">
                <div class="guven-ust">
                  <span>Güvenilirlik (Tüm TF Birleþik)</span>
                  <span style="color:${guvenRenk};font-weight:700">%${guven}</span>
                </div>
                <div class="guven-track">
                  <div class="guven-fill" style="width:${guven}%;background:${guvenRenk}"></div>
                </div>
              </div>

              <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <span style="color:var(--green);font-weight:700">LONG %${finalLongOran.toFixed(0)}</span>
                  <span style="color:var(--text2);font-size:11px">Birleþik Aðýrlýklý Skor</span>
                  <span style="color:var(--red);font-weight:700">SHORT %${finalShortOran.toFixed(0)}</span>
                </div>
                <div style="height:6px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden">
                  <div style="height:100%;display:flex;border-radius:3px;overflow:hidden">
                    <div style="width:${finalLongOran}%;background:var(--green)"></div>
                    <div style="width:${finalShortOran}%;background:var(--red)"></div>
                  </div>
                </div>
              </div>

              ${karar !== 'BEKLE' ? `
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center">
                  <div style="font-size:9px;color:var(--text2);margin-bottom:2px">Giriþ Zonu</div>
                  <div style="font-size:11px;font-weight:700;color:var(--text);letter-spacing:0">${girisZon}</div>
                </div>
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center">
                  <div style="font-size:9px;color:var(--text2);margin-bottom:2px">Stop Loss</div>
                  <div style="font-size:11px;font-weight:700;color:var(--red)">${slSeviye}</div>
                  <div style="font-size:8px;color:var(--text2)">${slPct_} risk</div>
                </div>
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center">
                  <div style="font-size:9px;color:var(--text2);margin-bottom:2px">TP1 / TP2</div>
                  <div style="font-size:11px;font-weight:700;color:var(--green)">${tp1}</div>
                  <div style="font-size:8px;color:var(--text2)">${tp2}</div>
                </div>
              </div>` : ''}

              <div style="display:flex;gap:6px">
                <button onclick="openKararMotoru()" style="flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:6px;border-radius:6px;font-size:10px;cursor:pointer">
                  â Detaylar
                </button>
                <button onclick="showDecisionSummary()" style="flex:1;background:var(--green);color:#000;border:none;padding:6px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">
                  â Özet
                </button>
              </div>
            </div>
          `;
        }

      } catch (e) {
        console.error('Karar paneli güncelleme hatasý:', e);
      }
    }

    // Karar motorunu çaðýr ve sonuçlarý göster
    function runKararMotoru(data) {
      if (typeof window.kararMotoru === 'function') {
        try {
          window.kararMotoru(data);
        } catch (e) {
          console.error('Karar motoru hatasý:', e);
        }
      }
    }

  </script>
