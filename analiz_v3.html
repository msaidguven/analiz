        if (tp1Long <= price || (tp1Long - price) / price > 0.50) tp1Long = price * 1.05;
        let tp2Long = direncler.length >= 2 ? direncler[1] : price * 1.10;
        if (tp2Long <= tp1Long || (tp2Long - price) / price > 0.50) tp2Long = tp1Long * 1.05;
        tp1 = fp_km(tp1Long); tp2 = fp_km(tp2Long);
      } else if (karar === 'SHORT') {

    // Helper functions
    function fp_km(v) {
      if (!v && v !== 0) return 'â';
      if (v >= 1000) return v.toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      if (v >= 1) return v.toFixed(4).replace(/\.?0+$/, '');
      return v.toFixed(6).replace(/\.?0+$/, '');
    }
    function pct_km(a, b) { return ((Math.abs(a - b) / b) * 100).toFixed(1); }
    
    // TF Aðýrlýklarý
    const TF_AGIRLIK = { '15m': 5, '1h': 10, '4h': 25, '1d': 35, '1w': 25 };
    
    // TF puan hesaplama
    function tfPuanHesapla(tf, tfData, globalData) {
      if (!tfData) return { long: 0, short: 0, trend: 'RANG', rsi: null, notlar: [] };
      
      let long = 0, short = 0;
      const notlar = [];

      // RSI
      if (rsi !== null && rsi !== undefined) {
        if (rsi > 85) { short += 25; notlar.push('RSI kritik aþýrý alým'); }
        else if (rsi > 70) { short += 12; notlar.push('RSI aþýrý alým'); }
        else if (rsi < 20) { long += 25; notlar.push('RSI kritik aþýrý satým'); }
        else if (rsi < 30) { long += 12; notlar.push('RSI aþýrý satým'); }
        else if (rsi >= 45 && rsi <= 65) { long += 5; notlar.push('RSI saðlýklý'); }
      }
      
      // MACD
      if (macd && macd.histogram !== undefined) {
        if (macd.histogram > 0 && macd.macd > 0) { long += 15; notlar.push('MACD güçlü yükseliþ'); }
        else if (macd.histogram < 0 && macd.macd < 0) { short += 15; notlar.push('MACD güçlü düþüþ'); }
        else if (macd.histogram > 0) { long += 8; notlar.push('MACD toparlanýyor'); }
        else { short += 8; notlar.push('MACD zayýflýyor'); }
      }
      
      // SMC
      if (smc) {
        if (smc.trend === 'BULLISH') { long += 12; notlar.push('SMC yükseliþ yapýsý'); }
        else if (smc.trend === 'BEARISH') { short += 12; notlar.push('SMC düþüþ yapýsý'); }
        if (smc.choch) {
          if (smc.choch.color === 'green') { long += 20; notlar.push('CHoCH yukarý'); }
          else { short += 20; notlar.push('CHoCH aþaðý'); }
        }
        if (smc.bos) {
          if (smc.bos.color === 'green') { long += 10; notlar.push('BOS yukarý'); }
          else { short += 10; notlar.push('BOS aþaðý'); }
        }
      }
      
      // EMA crossover
      if (ema20 && ema50) {
        if (ema20 > ema50) { long += 8; notlar.push('EMA20 > EMA50'); }
        else { short += 8; notlar.push('EMA20 < EMA50'); }
      }
      
      // Hacim trendi
      if (volTrend === 'Volume Spike') {
        if (globalData.chg24 > 0) { long += 8; notlar.push('Hacim sýçramasý yükseliþ'); }
        else { short += 8; notlar.push('Hacim sýçramasý düþüþ'); }
      }
      
      // Trend belirle
      let trend = 'RANG';
      if (long > short + 15) trend = 'BULL';
      else if (short > long + 15) trend = 'BEAR';
      
      return { long, short, trend, rsi, notlar };
    }

                <div class="flex flex-col">
                  <span class="text-[10px] font-black text-premium-red">${sonuc.finalShortOran.toFixed(0)}%</span>
                  <span class="text-[7px] text-analiz-text2 uppercase font-bold">SHORT</span>
                </div>
             </div>
          </div>
        </div>

        <div class="flex gap-2 mt-2">
          <button onclick="showDecisionSummary()" class="flex-1 py-2 bg-premium-purple/10 border border-premium-purple/30 text-premium-purple text-[10px] font-black uppercase tracking-widest rounded-lg hover:bg-premium-purple hover:text-black transition-all">ÖZET</button>
          <button onclick="openKararMotoru()" class="flex-1 py-2 bg-analiz-surface border border-analiz-border text-analiz-text2 text-[10px] font-black uppercase tracking-widest rounded-lg hover:border-premium-purple transition-all">DETAYLAR</button>
        </div>
      `;
    }

  </script>
</body>

</html>
