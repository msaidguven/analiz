<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Ayarları</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at 15% 20%, rgba(240,185,11,0.12), transparent 35%), radial-gradient(circle at 80% 10%, rgba(14,203,129,0.12), transparent 30%), #0b0e11; }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <nav class="flex flex-wrap gap-3 mb-8">
            <a href="index.html" class="px-4 py-2 rounded-lg border border-yellow-500/40 text-yellow-400 bg-yellow-500/10">Anasayfa</a>
            <a href="karar-analizi.html" class="px-4 py-2 rounded-lg border border-white/15 text-white/80 hover:text-white">Karar Merkezi</a>
            <a href="ayarlar.html" class="px-4 py-2 rounded-lg border border-green-500/40 text-green-400 bg-green-500/10">Ayarlar</a>
        </nav>

        <div class="rounded-2xl border border-white/10 bg-white/5 backdrop-blur p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">İşlem Ayarları</h1>
            <p class="text-white/70 mt-2">Buradaki değerler hem sinyal gönderiminde hem kayıt payload'ında kullanılır.</p>

            <form id="settingsForm" class="mt-8 space-y-5">
                <div>
                    <label for="kaldirac" class="block text-sm font-bold text-white/80 mb-2">Kaldıraç</label>
                    <input id="kaldirac" type="number" min="1" step="1" required class="w-full rounded-xl bg-black/30 border border-white/20 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-yellow-400" />
                </div>
                <div>
                    <label for="pozisyonUsdt" class="block text-sm font-bold text-white/80 mb-2">Pozisyon (USDT)</label>
                    <input id="pozisyonUsdt" type="number" min="0.1" step="0.1" required class="w-full rounded-xl bg-black/30 border border-white/20 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-green-400" />
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="px-6 py-3 rounded-xl bg-yellow-400 text-black font-extrabold">Kaydet</button>
                    <button type="button" id="resetBtn" class="px-6 py-3 rounded-xl border border-white/20 text-white/80">Varsayılan</button>
                </div>
                <p id="status" class="text-sm text-white/70"></p>
            </form>
        </div>
    </div>

    <script src="trade-settings.js"></script>
    <script>
        function render() {
            if (window.tradeSettingsManager) {
                const s = window.tradeSettingsManager.getSettings();
                document.getElementById('kaldirac').value = s.kaldirac;
                document.getElementById('pozisyonUsdt').value = s.pozisyon_usdt;
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const kaldirac = Number(document.getElementById('kaldirac').value);
            const pozisyonUsdt = Number(document.getElementById('pozisyonUsdt').value);

            if (!Number.isFinite(kaldirac) || kaldirac <= 0 || !Number.isFinite(pozisyonUsdt) || pozisyonUsdt <= 0) {
                document.getElementById('status').textContent = 'Lütfen geçerli pozitif değerler gir.';
                return;
            }

            if (window.tradeSettingsManager) {
                window.tradeSettingsManager.saveSettings(kaldirac, pozisyonUsdt);
                document.getElementById('status').textContent = 'Ayarlar kaydedildi.';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', function () {
            if (window.tradeSettingsManager) {
                window.tradeSettingsManager.resetToDefaults();
                render();
                document.getElementById('status').textContent = 'Varsayılan değerlere dönüldü.';
            }
        });

        // Sayfa yüklendiğinde ayarları göster
        setTimeout(render, 100);
    </script>
</body>
</html>
