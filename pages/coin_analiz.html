<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Analiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f8f6; color: #1a1a1a; padding: 1.5rem; font-size: 14px; }
    .section-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: .07em; text-transform: uppercase; margin: 1.5rem 0 .6rem; }
    .badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .badge-up { background: #E1F5EE; color: #0F6E56; }
    .badge-down { background: #FAECE7; color: #993C1D; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .mcard { background: #f0f0ec; border-radius: 8px; padding: .75rem 1rem; }
    .lbl { font-size: 12px; color: #888; margin-bottom: 3px; }
    .val { font-size: 19px; font-weight: 600; }
    .sub { font-size: 12px; color: #777; margin-top: 3px; }
    .up { color: #1D9E75 !important; }
    .down { color: #D85A30 !important; }
    .neutral { color: #888 !important; }
    .signal-card { background: #fff; border: .5px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; }
    .bar-row { display:flex; align-items:center; gap:8px; margin:6px 0; }
    .bar-bg { flex:1; height:7px; border-radius:4px; background:#e8e8e4; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; }
    .sr-row { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:.5px solid #eee; font-size:12px; }
    .sr-row:last-child { border:none; }
    .warn-box { margin-top: 1rem; padding: 14px 18px; border-radius: 12px; border: 1.5px solid #F5C842; background: #FAEEDA; }
    .alert-box { margin-top: 1rem; padding: 14px 18px; border-radius: 12px; border: 1.5px solid #F0997B; background: #FAECE7; }
    .top-nav { display:flex; gap:10px; margin-bottom: 14px; }
    .btn { display:inline-block; text-decoration:none; color:#444; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px 12px; }
    .loading { color:#777; font-size:13px; }
    .output-preview {
      margin-top: 12px;
      background: #030508;
      border: 1px solid #ddd;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: #9aa0a6;
      line-height: 1.8;
      white-space: pre-wrap;
      max-height: 260px;
      overflow-y: auto;
    }
    .big-copy-btn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      background: #00c853;
      border: none;
      color: #000;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .big-copy-btn:disabled { background: #9e9e9e; cursor: not-allowed; }
    .big-copy-btn.copied { background: #ffab00; }
    @media(max-width:700px){ .grid4,.grid3,.grid2{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <div class="top-nav">
    <a class="btn" href="./futures_analiz.html">← Listeye Dön</a>
  </div>
  <div id="app" class="loading">Veri yükleniyor...</div>
  <div id="loadStatus" class="sub" style="margin-top:8px;">Modüller: yükleniyor...</div>
  <div class="section-label">Claude'a Kopyala</div>
  <div class="output-preview" id="outputPreview">Veri yükleniyor...</div>
  <button class="big-copy-btn" id="copyBtn" onclick="copyData()" disabled>📋 KOPYALA</button>
  <div id="analysisGhost" style="display:none;">
    <div id="mtfIcon"></div><div id="mtfTitle"></div><div id="mtfSub"></div><div id="mtfScoreBar"></div>
    <div id="mtfCol1h"></div><div id="mtfCol4h"></div><div id="mtfCol1w"></div>
    <div id="srChart"></div><div id="srList"></div><div id="srIcon"></div><div id="srTitle"></div><div id="srSub"></div><div id="srSummary"></div>
    <div id="obvChart"></div><div id="obvTrendText"></div><div id="volMetrics"></div>
    <div id="btcCoinLabel"></div><div id="btcCompareGrid"></div><div id="btcCorrFill"></div><div id="btcCorrVal"></div><div id="btcCorrRow"></div><div id="btcAlerts"></div>
  </div>

  <script type="module">
    import { buildOutput, copyData } from '../js/output.js';
    import { state } from '../js/state.js';
    import { fetchAndRenderTA } from '../js/modules/mtf.js';
    import { fetchAndRenderSR } from '../js/modules/sr.js';
    import { fetchAndRenderVol } from '../js/modules/volume.js';
    import { fetchAndRenderBTC } from '../js/modules/btc.js';
    import { fetchCVDAnalysis } from '../js/modules/cvd.js';
    import { fetchOIChange } from '../js/modules/oi.js';
    import { renderFunding } from '../js/modules/funding.js';
    import { renderOrderBook } from '../js/modules/orderbook.js';
    window.copyData = copyData;

    const p = new URLSearchParams(location.search);
    const symbol = (p.get('symbol') || 'BTCUSDT').toUpperCase();

    const fmtMoney = (v) => {
      const n = Number(v); if (!Number.isFinite(n)) return '—';
      return '$' + n.toLocaleString('en-US', { maximumFractionDigits: n < 10 ? 4 : 2 });
    };
    const fmtCompact = (v) => {
      const n = Number(v); if (!Number.isFinite(n)) return '—';
      if (Math.abs(n) >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(2) + 'K';
      return '$' + n.toFixed(2);
    };

    async function load() {
      try {
        const [ticker, funding, oi, ls, ttAcc, ttPos, srKlines, ob] = await Promise.all([
          fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${symbol}`).then(r => r.json()),
          fetch(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${symbol}`).then(r => r.json()),
          fetch(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`).then(r => r.json()),
          fetch(`https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=${symbol}&period=5m&limit=1`).then(r => r.json()),
          fetch(`https://fapi.binance.com/futures/data/topLongShortAccountRatio?symbol=${symbol}&period=5m&limit=1`).then(r => r.json()),
          fetch(`https://fapi.binance.com/futures/data/topLongShortPositionRatio?symbol=${symbol}&period=5m&limit=1`).then(r => r.json()),
          fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=240`).then(r => r.json()),
          fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${symbol}&limit=50`).then(r => r.json())
        ]);

        const d = {
          price: Number(ticker.lastPrice),
          change: Number(ticker.priceChangePercent),
          volume: Number(ticker.quoteVolume),
          high: Number(ticker.highPrice),
          low: Number(ticker.lowPrice),
          funding: Number(funding.lastFundingRate) * 100,
          oiContracts: Number(oi.openInterest)
        };
        d.oiUSD = d.oiContracts * (d.price || 0);

        const longPct = ls?.[0] ? Number(ls[0].longAccount) * 100 : null;
        const shortPct = ls?.[0] ? Number(ls[0].shortAccount) * 100 : null;
        const lsRatio = ls?.[0] ? Number(ls[0].longShortRatio) : null;
        const ttA = ttAcc?.[0] ? Number(ttAcc[0].longShortRatio) : null;
        const ttP = ttPos?.[0] ? Number(ttPos[0].longShortRatio) : null;

        const highs = Array.isArray(srKlines) ? srKlines.map(k => Number(k[2])).filter(Number.isFinite) : [];
        const lows = Array.isArray(srKlines) ? srKlines.map(k => Number(k[3])).filter(Number.isFinite) : [];
        const r1 = highs.length ? Math.max(...highs) : null;
        const s1 = lows.length ? Math.min(...lows) : null;

        const bids = (ob.bids || []).slice(0, 3).map(([price, qty]) => ({ price: Number(price), qty: Number(qty) }));
        const asks = (ob.asks || []).slice(0, 3).map(([price, qty]) => ({ price: Number(price), qty: Number(qty) }));

        state.oiData = {};
        state.cvdData = {};
        state.srData = { supports: s1 ? [{ price: s1, touches: 1 }] : [], resistances: r1 ? [{ price: r1, touches: 1 }] : [] };
        state.volData = {};
        state.btcData = {};
        state.taData = {};
        state.fundingData = {};
        state.orderbookData = {};
        state.detailData = d;

        const app = document.getElementById('app');
        app.className = '';
        app.innerHTML = `
          <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem;">
            ${symbol} · ${new Date().toLocaleString('tr-TR')}
          </div>

          <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:.3rem;">
            <span style="font-size:38px;font-weight:700;">${fmtMoney(d.price)}</span>
            <span class="badge ${d.change >= 0 ? 'badge-up' : 'badge-down'}">${d.change >= 0 ? '+' : ''}${d.change.toFixed(2)}% (24s)</span>
            <span class="badge ${d.funding > 0.03 ? 'badge-down' : 'badge-up'}">Funding ${d.funding.toFixed(4)}%</span>
          </div>
          <div style="font-size:13px;color:#555;margin-bottom:.5rem;">24s: Alt <b>${fmtMoney(d.low)}</b> — Üst <b>${fmtMoney(d.high)}</b> · Hacim: <b>${fmtCompact(d.volume)}</b></div>

          <div class="section-label">Ana Metrikler</div>
          <div class="grid4">
            <div class="mcard"><div class="lbl">Hacim (24s)</div><div class="val">${fmtCompact(d.volume)}</div></div>
            <div class="mcard"><div class="lbl">Açık Pozisyon</div><div class="val">${fmtCompact(d.oiUSD)}</div></div>
            <div class="mcard"><div class="lbl">Fonlama Oranı</div><div class="val ${d.funding < 0 ? 'up' : (d.funding > 0.03 ? 'down' : 'neutral')}">${d.funding.toFixed(4)}%</div></div>
            <div class="mcard"><div class="lbl">Açık Kontrat</div><div class="val">${d.oiContracts.toLocaleString('tr-TR')}</div></div>
          </div>

          <div class="section-label">Order Book Derinliği — Anlık Görüntü</div>
          <div class="signal-card">
            <div class="grid2">
              <div><div class="lbl up">BID</div>${bids.map(b=>`<div class='sr-row'><span class='up'>${fmtMoney(b.price)}</span><span>${b.qty.toLocaleString('tr-TR')}</span></div>`).join('')}</div>
              <div><div class="lbl down">ASK</div>${asks.map(a=>`<div class='sr-row'><span class='down'>${fmtMoney(a.price)}</span><span>${a.qty.toLocaleString('tr-TR')}</span></div>`).join('')}</div>
            </div>
          </div>

          <div class="section-label">Long / Short Dağılımı</div>
          <div class="signal-card">
            <div class="bar-row"><span style="width:44px" class="up">Long</span><div class="bar-bg"><div class="bar-fill" style="width:${longPct || 50}%;background:#1D9E75"></div></div><span class="up">${longPct ? longPct.toFixed(1) : '—'}%</span></div>
            <div class="bar-row"><span style="width:44px" class="down">Short</span><div class="bar-bg"><div class="bar-fill" style="width:${shortPct || 50}%;background:#D85A30"></div></div><span class="down">${shortPct ? shortPct.toFixed(1) : '—'}%</span></div>
            <div class="sub">Global L/S: <b>${lsRatio ? lsRatio.toFixed(4) : '—'}</b> · Top Trader Hesap: <b>${ttA ? ttA.toFixed(4) : '—'}</b> · Pozisyon: <b>${ttP ? ttP.toFixed(4) : '—'}</b></div>
          </div>

          <div class="section-label">Destek ve Direnç Seviyeleri</div>
          <div class="signal-card">
            <div class="sr-row"><span class="down">D1 ${fmtMoney(r1)}</span><span>${r1 ? ('%' + (((r1 - d.price)/d.price)*100).toFixed(2)) : '—'}</span></div>
            <div class="sr-row"><span class="up">S1 ${fmtMoney(s1)}</span><span>${s1 ? ('%' + (((d.price - s1)/d.price)*100).toFixed(2)) : '—'}</span></div>
          </div>

          <div class="warn-box"><b>Not:</b> Sayfa artık tamamen dinamik çalışıyor. Her coin için bu tasarım aynı şekilde doldurulur.</div>
        `;

        d.longPct = longPct;
        d.shortPct = shortPct;
        d.lsRatio = lsRatio;
        d.ttAcc = ttA;
        d.ttPos = ttP;
        d.orderbookData = { bids, asks };
        state.detailData = d;
        buildOutput(d, symbol);
        document.getElementById('copyBtn').disabled = false;

        // output.js icin eksik kalan tum veri bloklarini doldur
        const tasks = await Promise.allSettled([
          fetchAndRenderTA(symbol),
          fetchAndRenderSR(symbol, d.price),
          fetchAndRenderVol(symbol),
          fetchAndRenderBTC(symbol, d.price),
          fetchCVDAnalysis(symbol).then((cvd) => { if (cvd && !cvd.error) state.cvdData = cvd; }),
          fetchOIChange(symbol).then((oiPayload) => { if (oiPayload && !oiPayload.error) state.oiData = oiPayload; }),
          renderFunding(symbol, document.createElement('div')),
          renderOrderBook(symbol, document.createElement('div'))
        ]);

        const labels = ['TA', 'SR', 'VOL', 'BTC', 'CVD', 'OI', 'FUNDING', 'ORDERBOOK'];
        const ok = [];
        const fail = [];
        tasks.forEach((r, i) => {
          if (r.status === 'fulfilled') ok.push(labels[i]);
          else fail.push(labels[i]);
        });

        buildOutput(state.detailData, symbol);
        const raw = state.detailData?._text || document.getElementById('outputPreview').textContent || '';
        const statusLine = `[LOAD_STATUS]\nloaded=${ok.join(',') || '-'}\nfailed=${fail.join(',') || '-'}\n`;
        state.detailData._text = `${statusLine}\n${raw}`;
        document.getElementById('outputPreview').textContent = state.detailData._text;
        document.getElementById('loadStatus').innerHTML =
          `Modüller: <span class="up">${ok.length}</span> yüklendi · <span class="${fail.length ? 'down' : 'up'}">${fail.length}</span> hata`;
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class='alert-box'><b>Veri alınamadı:</b> ${err.message}</div>`;
        document.getElementById('outputPreview').textContent = `Hata: ${err.message}`;
        document.getElementById('copyBtn').disabled = true;
        document.getElementById('loadStatus').innerHTML = `Modüller: <span class="down">yükleme hatası</span>`;
      }
    }

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
